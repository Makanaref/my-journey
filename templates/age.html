{% extends "base.html" %}
{% block title %}Age Calculator{% endblock %}
{% block content %}
    <h1>Age Calculator 🎂</h1>
    <div class="card">
        <input type="date" id="dob" style="width:90%;padding:12px;border-radius:8px;border:none;background:#0f3460;color:white;font-size:1em;">
        <br><br>
        <button class="btn" onclick="calculate()">Calculate!</button>
    </div>
    <div class="card" id="result" style="display:none;">
        <h2 id="years" style="color:#e94560;font-size:3em;"></h2>
        <p id="details" style="color:#aaa;"></p>
    </div>
    <script>
        function calculate() {
            const dob = new Date(document.getElementById("dob").value);
            if (!dob) { alert("Please enter a date!"); return; }
            const today = new Date();
            let years = today.getFullYear() - dob.getFullYear();
            let months = today.getMonth() - dob.getMonth();
            let days = today.getDate() - dob.getDate();
            if (days < 0) { months--; days += 30; }
            if (months < 0) { years--; months += 12; }
            document.getElementById("years").innerText = years + " Years Old";
            document.getElementById("details").innerText = months + " months and " + days + " days";
            document.getElementById("result").style.display = "block";
        }
    </script>
{% endblock %}
