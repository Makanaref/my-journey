{% extends "base.html" %}
{% block title %}Color Picker{% endblock %}
{% block content %}
<div style="max-width:440px; margin:60px auto; padding:0 20px;">

    <p style="font-size:13px; color:#666; margin-bottom:4px;">Color Picker</p>
    <h1 style="font-size:22px; font-weight:500; margin-bottom:32px; color:#fff;">🎨 Color Picker</h1>

    <div style="background:#16213e; border-radius:12px; border:0.5px solid rgba(233,69,96,0.15); padding:28px;">
        <div id="preview" style="width:100%; height:120px; border-radius:8px; background:#e94560; margin-bottom:20px; transition:background 0.2s;"></div>
        <div style="margin-bottom:16px;">
            <label style="font-size:12px; color:#666; display:block; margin-bottom:6px;">Pick a color</label>
            <input type="color" id="picker" value="#e94560" oninput="update()" style="width:100%; height:44px; border-radius:8px; border:none; cursor:pointer; background:none;">
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div style="background:#0f3460; border-radius:8px; padding:14px;">
                <p style="font-size:11px; color:#666; margin:0 0 4px;">HEX</p>
                <p id="hex" style="font-size:16px; font-weight:500; color:#fff; margin:0; font-family:monospace;">#e94560</p>
            </div>
            <div style="background:#0f3460; border-radius:8px; padding:14px;">
                <p style="font-size:11px; color:#666; margin:0 0 4px;">RGB</p>
                <p id="rgb" style="font-size:16px; font-weight:500; color:#fff; margin:0; font-family:monospace;"></p>
            </div>
        </div>
        <button onclick="copyHex()" style="width:100%; padding:12px; background:#e94560; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; margin-top:16px;">Copy HEX</button>
    </div>
</div>

<script>
function hexToRgb(hex) {
    let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `${r}, ${g}, ${b}`;
}
function update() {
    let c = document.getElementById('picker').value;
    document.getElementById('preview').style.background = c;
    document.getElementById('hex').innerText = c.toUpperCase();
    document.getElementById('rgb').innerText = hexToRgb(c);
}
function copyHex() {
    navigator.clipboard.writeText(document.getElementById('hex').innerText);
    alert('Copied!');
}
update();
</script>
{% endblock %}
