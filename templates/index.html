{% extends "base.html" %}
{% block title %}Home 🚀{% endblock %}
{% block content %}

<div style="text-align:center; padding: 60px 30px 20px;">

<!-- Hero -->
    <div style="position:relative; max-width:760px; margin:0 auto;">

        <div style="position:absolute; top:-40px; left:50%; transform:translateX(-50%); width:420px; height:320px; background:radial-gradient(ellipse, rgba(233,69,96,0.12), rgba(0,0,0,0) 70%); filter:blur(20px); pointer-events:none; z-index:0;"></div>

        <div style="position:relative; z-index:1; display:flex; align-items:stretch; justify-content:center; gap:20px; flex-wrap:wrap; opacity:0; animation: fadeUp 0.6s ease forwards;">

            <a href="/gm" class="hero-card">
                <div class="hero-card-icon">
                    <span class="hero-emoji">👋</span>
                </div>
                <div class="hero-card-title">GM</div>
                <div class="hero-card-desc">Say good morning onchain, every day</div>
                <div class="hero-card-arrow">→</div>
            </a>

            <a href="/games" class="hero-card hero-card-gold">
                <div class="hero-card-icon hero-card-icon-gold">
                    <span class="hero-emoji hero-emoji-game">🎮</span>
                </div>
                <div class="hero-card-title hero-card-title-gold">Onchain Game</div>
                <div class="hero-card-desc">Play small onchain experiments</div>
                <div class="hero-card-arrow hero-card-arrow-gold">→</div>
            </a>

            <a href="/mint" class="hero-card hero-card-teal">
                <div class="hero-card-icon hero-card-icon-teal">
                    <span class="hero-emoji hero-emoji-coin">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="9.5" stroke="#2dd4bf" stroke-width="1.5" fill="rgba(45,212,191,0.1)"/>
                            <circle cx="12" cy="12" r="6.5" stroke="#2dd4bf" stroke-width="1" opacity="0.5"/>
                            <text x="12" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#2dd4bf" font-family="Georgia, serif">$</text>
                        </svg>
                    </span>
                </div>
                <div class="hero-card-title hero-card-title-teal">Mint Token</div>
                <div class="hero-card-desc">Create and manage your own token</div>
                <div class="hero-card-arrow hero-card-arrow-teal">→</div>
            </a>

        </div>
    </div>

    <style>
        @keyframes wave {
            0%, 60%, 100% { transform: rotate(0deg); }
            10% { transform: rotate(14deg); }
            20% { transform: rotate(-8deg); }
            30% { transform: rotate(14deg); }
            40% { transform: rotate(-4deg); }
            50% { transform: rotate(10deg); }
        }
        @keyframes floaty {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hero-card {
            position:relative;
            width:260px;
            padding:32px 24px 26px;
            border-radius:20px;
            text-decoration:none;
            text-align:left;
            background: linear-gradient(160deg, rgba(255,255,255,0.045), rgba(255,255,255,0.015));
            backdrop-filter: blur(6px);
            border:1px solid rgba(233,69,96,0.22);
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .hero-card:hover {
            transform: translateY(-6px);
            border-color: rgba(233,69,96,0.5);
            box-shadow: 0 16px 34px rgba(233,69,96,0.18);
        }
        .hero-card-gold:hover {
            border-color: rgba(247,179,43,0.5);
            box-shadow: 0 16px 34px rgba(247,179,43,0.18);
        }
        .hero-card-icon {
            width:56px; height:56px; border-radius:16px;
            display:flex; align-items:center; justify-content:center;
            font-size:1.6em;
            background: rgba(233,69,96,0.1);
            border:1px solid rgba(233,69,96,0.25);
            margin-bottom:18px;
        }
        .hero-card-icon-gold {
            background: rgba(247,179,43,0.1);
            border-color: rgba(247,179,43,0.25);
        }
        .hero-emoji {
            display:inline-block;
            animation: wave 1.8s infinite;
        }
        .hero-emoji-game {
            animation: floaty 2.4s ease-in-out infinite;
        }
        .hero-card-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size:1.5em; font-weight:700;
            color:#fff; margin-bottom:8px;
        }
        .hero-card-title-gold { color:#f7d98a; }
        .hero-card-desc {
            color:rgba(255,255,255,0.45);
            font-size:0.85em; line-height:1.5;
            margin-bottom:22px;
        }
        .hero-card-arrow {
            display:inline-flex; align-items:center; justify-content:center;
            width:34px; height:34px; border-radius:50%;
            color:#e94560;
            border:1px solid rgba(233,69,96,0.3);
            background: rgba(233,69,96,0.06);
            transition: transform 0.3s ease, background 0.3s ease;
        }
        .hero-card-arrow-gold {
            color:#f7b32b;
            border-color: rgba(247,179,43,0.3);
            background: rgba(247,179,43,0.06);
        }
        .hero-card:hover .hero-card-arrow {
            transform: translateX(5px);
            background: rgba(233,69,96,0.16);
        }
        .hero-card:hover .hero-card-arrow-gold {
            background: rgba(247,179,43,0.16);
        }
        .hero-card-teal:hover {
            border-color: rgba(45,212,191,0.5);
            box-shadow: 0 16px 34px rgba(45,212,191,0.18);
        }
        .hero-card-icon-teal {
            background: rgba(45,212,191,0.1);
            border-color: rgba(45,212,191,0.25);
        }
        .hero-card-title-teal { color:#5eead4; }
        .hero-card-arrow-teal {
            color:#2dd4bf;
            border-color: rgba(45,212,191,0.3);
            background: rgba(45,212,191,0.06);
        }
        .hero-card:hover .hero-card-arrow-teal {
            background: rgba(45,212,191,0.16);
        }
        .hero-emoji-coin {
            display:inline-block;
            animation: floaty 2.6s ease-in-out infinite;
        }
        @media (max-width: 560px) {
            .hero-card { width:100%; max-width:320px; }
        }
    </style>

    

    <!-- Blockchain Animation -->
    <div id="chain-anim" style="position:relative; width:100%; max-width:900px; height:220px; margin:0 auto; border-radius:16px; overflow:hidden; background:radial-gradient(ellipse at center, rgba(233,69,96,0.06), rgba(0,0,0,0) 70%);">
        <canvas id="chain-canvas" style="display:block; width:100%; height:100%;"></canvas>
    </div>

    <script>
    (function () {
        const canvas = document.getElementById('chain-canvas');
        const ctx = canvas.getContext('2d');
        const wrap = document.getElementById('chain-anim');
        let w, h, blocks = [], particles = [];

        function rand(min, max) { return Math.random() * (max - min) + min; }

        function roundRect(x, y, size, r) {
            const half = size / 2;
            ctx.beginPath();
            ctx.moveTo(x - half + r, y - half);
            ctx.arcTo(x + half, y - half, x + half, y + half, r);
            ctx.arcTo(x + half, y + half, x - half, y + half, r);
            ctx.arcTo(x - half, y + half, x - half, y - half, r);
            ctx.arcTo(x - half, y - half, x + half, y - half, r);
            ctx.closePath();
        }

        function buildScene() {
            const count = w < 640 ? 4 : 6;
            blocks = [];
            const marginX = w * 0.14;
            const usable = w - marginX * 2;
            for (let i = 0; i < count; i++) {
                blocks.push({
                    x: marginX + (count === 1 ? 0 : (usable / (count - 1)) * i),
                    y: h / 2,
                    size: 46,
                    hash: '0x' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0')
                });
            }
            particles = [];
            for (let i = 0; i < 14; i++) {
                particles.push({
                    x: rand(0, w), y: rand(0, h),
                    vx: rand(-0.04, 0.04), vy: rand(-0.04, 0.04),
                    r: rand(1, 1.6), a: rand(0.06, 0.16)
                });
            }
        }

        function resize() {
            w = canvas.width = wrap.clientWidth;
            h = canvas.height = wrap.clientHeight;
            buildScene();
        }
        window.addEventListener('resize', resize);
        resize();

        let t = 0;

        function step() {
            ctx.clearRect(0, 0, w, h);
            t += 0.006;

            for (const p of particles) {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > w) p.vx *= -1;
                if (p.y < 0 || p.y > h) p.vy *= -1;
                ctx.beginPath();
                ctx.fillStyle = `rgba(255,255,255,${p.a})`;
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let i = 0; i < blocks.length - 1; i++) {
                const a = blocks[i], b = blocks[i + 1];
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(233,69,96,0.35)';
                ctx.lineWidth = 2;
                ctx.moveTo(a.x + a.size / 2, a.y);
                ctx.lineTo(b.x - b.size / 2, b.y);
                ctx.stroke();
            }

            const totalSegments = blocks.length - 1;
            const progress = (t % 1) * totalSegments;
            const segIndex = Math.min(Math.floor(progress), totalSegments - 1);
            const segT = progress - segIndex;
            const pa = blocks[segIndex], pb = blocks[segIndex + 1];
            const px = pa.x + (pb.x - pa.x) * segT;
            const py = pa.y + (pb.y - pa.y) * segT;

            const glowGrad = ctx.createRadialGradient(px, py, 0, px, py, 22);
            glowGrad.addColorStop(0, 'rgba(247,179,43,0.9)');
            glowGrad.addColorStop(1, 'rgba(247,179,43,0)');
            ctx.beginPath();
            ctx.fillStyle = glowGrad;
            ctx.arc(px, py, 22, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.fillStyle = '#f7b32b';
            ctx.arc(px, py, 3.5, 0, Math.PI * 2);
            ctx.fill();

            blocks.forEach((b, idx) => {
                const isLit = (idx === segIndex && segT < 0.5) || (idx === segIndex + 1 && segT >= 0.5) || (idx === 0 && segIndex === 0 && segT < 0.15);
                roundRect(b.x, b.y, b.size, 8);
                ctx.fillStyle = 'rgba(22,28,46,0.9)';
                ctx.fill();
                ctx.lineWidth = isLit ? 2 : 1.2;
                ctx.strokeStyle = isLit ? '#f7b32b' : 'rgba(233,69,96,0.55)';
                ctx.stroke();

                ctx.fillStyle = 'rgba(255,255,255,0.85)';
                ctx.font = '11px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('#' + (idx + 1), b.x, b.y + 4);

                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.font = '9px monospace';
                ctx.fillText(b.hash, b.x, b.y + b.size / 2 + 16);
            });

            requestAnimationFrame(step);
        }
        step();
    })();
    </script>

</div>

{% endblock %}
