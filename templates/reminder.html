{% extends "base.html" %}
{% block title %}Reminder{% endblock %}
{% block content %}
<div style="max-width:560px; margin:60px auto; padding:0 20px;">

    <p style="font-size:13px; color:#666; margin-bottom:4px;">Reminder</p>
    <h1 style="font-size:22px; font-weight:500; margin-bottom:32px; color:#fff;">🔔 Reminders</h1>

    <div style="background:#16213e; border-radius:12px; border:0.5px solid rgba(233,69,96,0.15); padding:28px; margin-bottom:20px;">
        <div style="margin-bottom:12px;">
            <label style="font-size:12px; color:#666; display:block; margin-bottom:6px;">Title</label>
            <input type="text" id="rtitle" placeholder="Reminder title..." style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px;">
        </div>
        <div style="margin-bottom:16px;">
            <label style="font-size:12px; color:#666; display:block; margin-bottom:6px;">Date & Time</label>
            <input type="datetime-local" id="rdate" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px;">
        </div>
        <button onclick="addReminder()" style="width:100%; padding:12px; background:#e94560; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer;">Add Reminder</button>
    </div>

    <div id="reminders-container"></div>
</div>

<script>
let reminders = JSON.parse(localStorage.getItem('reminders') || '[]');
function save() { localStorage.setItem('reminders', JSON.stringify(reminders)); }
function addReminder() {
    let t = document.getElementById('rtitle').value.trim();
    let d = document.getElementById('rdate').value;
    if (!t || !d) return alert('Please fill all fields!');
    reminders.push({id: Date.now(), title: t, date: d});
    reminders.sort((a,b) => new Date(a.date) - new Date(b.date));
    save(); render();
    document.getElementById('rtitle').value = '';
    document.getElementById('rdate').value = '';
}
function deleteReminder(id) { reminders = reminders.filter(r => r.id !== id); save(); render(); }
function render() {
    let now = new Date();
    document.getElementById('reminders-container').innerHTML = reminders.length ? reminders.map(r => {
        let d = new Date(r.date);
        let passed = d < now;
        return `<div style="background:#16213e; border-radius:12px; border:0.5px solid ${passed ? 'rgba(233,69,96,0.3)' : 'rgba(78,204,163,0.2)'}; padding:20px; margin-bottom:12px;">
            <div style="display:flex; justify-content:space-between; align-items:start;">
                <div>
                    <p style="font-size:15px; font-weight:500; color:#fff; margin:0 0 4px;">${r.title}</p>
                    <p style="font-size:12px; color:#666; margin:0;">📅 ${d.toLocaleString()}</p>
                    <span style="display:inline-block; margin-top:6px; font-size:11px; padding:2px 8px; border-radius:20px; background:${passed ? 'rgba(233,69,96,0.1)' : 'rgba(78,204,163,0.1)'}; color:${passed ? '#e94560' : '#4ecca3'};">${passed ? 'Passed' : 'Upcoming'}</span>
                </div>
                <button onclick="deleteReminder(${r.id})" style="background:none; border:none; color:#666; cursor:pointer; font-size:16px;">✕</button>
            </div>
        </div>`;
    }).join('') : '<p style="color:#666; text-align:center; font-size:13px;">No reminders yet</p>';
}
render();
setInterval(render, 60000);
</script>
{% endblock %}
