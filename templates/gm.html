{% extends "base.html" %}
{% block title %}GM{% endblock %}
{% block content %}
    <h1>GM 👋</h1>
    <div class="card">
        <p id="status" style="color:#aaa;">Wallet not connected</p>
        <br>
        <button class="btn" id="connect-btn" onclick="connectWallet()">Connect Wallet</button>
    </div>
    <div class="card" id="network-card" style="display:none;">
        <h3 style="color:#e94560;">Select Network</h3>
        <button class="btn" onclick="switchNetwork('lamina1')">Lamina1</button>
        <button class="btn" onclick="switchNetwork('nexus')">Nexus</button>
        <p id="current-network" style="margin-top:15px;color:#aaa;"></p>
    </div>
    <div class="card" id="gm-card" style="display:none;">
        <button class="btn" style="font-size:1.5em;padding:20px 50px;" onclick="sayGM()">GM! 👋</button>
        <p id="tx-status" style="margin-top:15px;color:#aaa;"></p>
        <br>
        <div id="my-stats" style="color:#aaa;"></div>
    </div>
    <div class="card" id="leaderboard-card" style="display:none;">
        <h3 style="color:#e94560;">Leaderboard 🏆</h3>
        <div id="leaderboard-list" style="text-align:left;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
    <script>
        let provider, signer, account, contract, currentNet;

        const CONTRACT_ADDRESS = "0x91A68410C13866d1c4262C012680A623B79BeF20";

        const CONTRACT_ABI = [
            "function sayGM() public",
            "function getStats(address user) public view returns (uint256 streak, uint256 totalScoreX100, uint256 lastGmDay)",
            "function getLeaderboard() public view returns (address[] memory addrs, uint256[] memory streaks, uint256[] memory scoresX100)"
        ];

        const networks = {
            lamina1: {
                chainIdHex: "0x" + (10849).toString(16),
                chainName: "Lamina1",
                rpcUrls: ["https://subnets.avax.network/lamina1/mainnet/rpc"],
                nativeCurrency: { name: "L1", symbol: "L1", decimals: 18 },
                blockExplorerUrls: ["https://subnets.avax.network/lamina1"]
            },
            nexus: {
                chainIdHex: "0x" + (3946).toString(16),
                chainName: "Nexus",
                rpcUrls: ["https://mainnet.rpc.nexus.xyz"],
                nativeCurrency: { name: "NEX", symbol: "NEX", decimals: 18 },
                blockExplorerUrls: ["https://explorer.nexus.xyz"]
            }
        };

        async function connectWallet() {
            if (!window.ethereum) {
                alert("Please install MetaMask!");
                return;
            }
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                account = await signer.getAddress();
                document.getElementById("status").innerText = "Connected: " + account.slice(0,6) + "..." + account.slice(-4);
                document.getElementById("connect-btn").innerText = "Connected ✅";
                document.getElementById("network-card").style.display = "block";
            } catch (err) {
                alert("Connection failed: " + err.message);
            }
        }

        async function switchNetwork(net) {
            const config = networks[net];
            try {
                await window.ethereum.request({
                    method: "wallet_addEthereumChain",
                    params: [{
                        chainId: config.chainIdHex,
                        chainName: config.chainName,
                        rpcUrls: config.rpcUrls,
                        nativeCurrency: config.nativeCurrency,
                        blockExplorerUrls: config.blockExplorerUrls
                    }]
                });
                currentNet = net;
                contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
                document.getElementById("current-network").innerText = "Connected to: " + config.chainName;
                document.getElementById("gm-card").style.display = "block";
                document.getElementById("leaderboard-card").style.display = "block";
                await loadStats();
                await loadLeaderboard();
            } catch (err) {
                alert("Network switch failed: " + err.message);
            }
        }

        async function sayGM() {
            document.getElementById("tx-status").innerText = "Sending transaction...";
            try {
                const tx = await contract.sayGM();
                document.getElementById("tx-status").innerText = "Transaction sent! Waiting...";
                await tx.wait();
                document.getElementById("tx-status").innerText = "GM confirmed! ✅";
                await loadStats();
                await loadLeaderboard();
            } catch (err) {
                document.getElementById("tx-status").innerText = "Failed: " + (err.reason || err.message);
            }
        }

        async function loadStats() {
            try {
                const result = await contract.getStats(account);
                const streak = result[0].toString();
                const score = (Number(result[1]) / 100).toFixed(2);
                document.getElementById("my-stats").innerText = "Your Streak: " + streak + " 🔥 | Score: " + score;
            } catch (err) {
                console.log(err);
            }
        }

        async function loadLeaderboard() {
            try {
                const result = await contract.getLeaderboard();
                const addrs = result[0];
                const streaks = result[1];
                const scores = result[2];
                let rows = [];
                for (let i = 0; i < addrs.length; i++) {
                    rows.push({
                        addr: addrs[i],
                        streak: Number(streaks[i]),
                        score: Number(scores[i]) / 100
                    });
                }
                rows.sort((a, b) => b.score - a.score);
                const listEl = document.getElementById("leaderboard-list");
                listEl.innerHTML = rows.slice(0, 10).map((r, i) =>
                    `<p>${i+1}. ${r.addr.slice(0,6)}...${r.addr.slice(-4)} — Streak: ${r.streak} 🔥 — Score: ${r.score.toFixed(2)}</p>`
                ).join("");
            } catch (err) {
                console.log(err);
            }
        }
    </script>
{% endblock %}
