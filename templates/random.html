{% extends "base.html" %}
{% block title %}Random Generator{% endblock %}
{% block content %}
<div style="max-width:440px; margin:60px auto; padding:0 20px;">

    <p style="font-size:13px; color:#666; margin-bottom:4px;">Random Generator</p>
    <h1 style="font-size:22px; font-weight:500; margin-bottom:32px; color:#fff;">🎰 Random</h1>

    <div style="background:#16213e; border-radius:12px; border:0.5px solid rgba(233,69,96,0.15); padding:28px; margin-bottom:16px;">
        <p style="font-size:12px; color:#666; margin:0 0 16px;">Random Number</p>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
            <div>
                <label style="font-size:12px; color:#666; display:block; margin-bottom:6px;">Min</label>
                <input type="number" id="min" value="1" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px;">
            </div>
            <div>
                <label style="font-size:12px; color:#666; display:block; margin-bottom:6px;">Max</label>
                <input type="number" id="max" value="100" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px;">
            </div>
        </div>
        <button onclick="genNum()" style="width:100%; padding:12px; background:#e94560; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer;">Generate</button>
        <p id="num-result" style="font-size:48px; font-weight:500; color:#e94560; text-align:center; margin:16px 0 0;"></p>
    </div>

    <div style="background:#16213e; border-radius:12px; border:0.5px solid rgba(233,69,96,0.15); padding:28px;">
        <p style="font-size:12px; color:#666; margin:0 0 16px;">Pick from list</p>
        <textarea id="list" placeholder="Item 1&#10;Item 2&#10;Item 3" rows="4" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px; resize:vertical;"></textarea>
        <button onclick="pickItem()" style="width:100%; padding:12px; background:#e94560; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; margin-top:12px;">Pick Random</button>
        <p id="item-result" style="font-size:20px; font-weight:500; color:#e94560; text-align:center; margin:16px 0 0;"></p>
    </div>
</div>

<script>
function genNum() {
    let min = parseInt(document.getElementById('min').value);
    let max = parseInt(document.getElementById('max').value);
    document.getElementById('num-result').innerText = Math.floor(Math.random() * (max - min + 1)) + min;
}
function pickItem() {
    let items = document.getElementById('list').value.split('\n').map(s=>s.trim()).filter(Boolean);
    if (!items.length) return;
    document.getElementById('item-result').innerText = items[Math.floor(Math.random() * items.length)];
}
</script>
{% endblock %}
