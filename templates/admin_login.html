{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div style="max-width:380px; margin:80px auto; padding:32px; background:rgba(255,255,255,0.03); border:1px solid rgba(233,69,96,0.2); border-radius:16px;">
    <h2 style="text-align:center; margin-bottom:24px;">🔒 Admin Login</h2>
    {% if error %}
    <p style="color:#e94560; text-align:center; margin-bottom:16px; font-size:0.9em;">{{ error }}</p>
    {% endif %}
    <form method="POST">
        <div style="margin-bottom:16px;">
            <label style="font-size:12px; color:#666; display:block; margin-bottom:6px;">Username</label>
            <input type="text" name="username" required style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px;">
        </div>
        <div style="margin-bottom:20px;">
            <label style="font-size:12px; color:#666; display:block; margin-bottom:6px;">Password</label>
            <input type="password" name="password" required style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px;">
        </div>
        <button type="submit" style="width:100%; padding:12px; background:#e94560; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">Login</button>
    </form>
</div>
{% endblock %}
