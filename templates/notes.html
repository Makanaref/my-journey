{% extends "base.html" %}
{% block title %}Notes{% endblock %}
{% block content %}
<div style="max-width:560px; margin:60px auto; padding:0 20px;">

    <p style="font-size:13px; color:#666; margin-bottom:4px;">Notes</p>
    <h1 style="font-size:22px; font-weight:500; margin-bottom:32px; color:#fff;">📝 My Notes</h1>

    <div style="background:#16213e; border-radius:12px; border:0.5px solid rgba(233,69,96,0.15); padding:28px; margin-bottom:20px;">
        <div style="margin-bottom:12px;">
            <label style="font-size:12px; color:#666; display:block; margin-bottom:6px;">Title</label>
            <input type="text" id="title" placeholder="Note title..." style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px;">
        </div>
        <div style="margin-bottom:16px;">
            <label style="font-size:12px; color:#666; display:block; margin-bottom:6px;">Content</label>
            <textarea id="body" placeholder="Write your note..." rows="4" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px; resize:vertical;"></textarea>
        </div>
        <button onclick="addNote()" style="width:100%; padding:12px; background:#e94560; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer;">Add Note</button>
    </div>

    <div style="margin-bottom:16px;">
        <input type="text" id="search" placeholder="Search notes..." oninput="renderNotes()" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#16213e; color:#fff; font-size:14px;">
    </div>

    <div id="notes-container"></div>
</div>

<script>
let notes = JSON.parse(localStorage.getItem('notes') || '[]');
function save() { localStorage.setItem('notes', JSON.stringify(notes)); }
function addNote() {
    let t = document.getElementById('title').value.trim();
    let b = document.getElementById('body').value.trim();
    if (!t && !b) return;
    notes.unshift({id: Date.now(), title: t, body: b});
    save(); renderNotes();
    document.getElementById('title').value = '';
    document.getElementById('body').value = '';
}
function deleteNote(id) { notes = notes.filter(n => n.id !== id); save(); renderNotes(); }
function renderNotes() {
    let q = document.getElementById('search').value.toLowerCase();
    let filtered = notes.filter(n => n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q));
    document.getElementById('notes-container').innerHTML = filtered.length ? filtered.map(n => `
        <div style="background:#16213e; border-radius:12px; border:0.5px solid rgba(233,69,96,0.15); padding:20px; margin-bottom:12px;">
            <div style="display:flex; justify-content:space-between; align-items:start;">
                <div>
                    <p style="font-size:15px; font-weight:500; color:#fff; margin:0 0 6px;">${n.title || 'Untitled'}</p>
                    <p style="font-size:13px; color:#666; margin:0; line-height:1.6;">${n.body}</p>
                </div>
                <button onclick="deleteNote(${n.id})" style="background:none; border:none; color:#666; cursor:pointer; font-size:16px; padding:0 0 0 12px;">✕</button>
            </div>
        </div>`).join('') : '<p style="color:#666; text-align:center; font-size:13px;">No notes yet</p>';
}
renderNotes();
</script>
{% endblock %}
