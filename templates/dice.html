{% extends "base.html" %}
{% block title %}Dice{% endblock %}
{% block content %}
<div style="max-width:380px; margin:60px auto; padding:0 20px; text-align:center;">

    <p style="font-size:13px; color:#666; margin-bottom:4px;">Dice</p>
    <h1 style="font-size:22px; font-weight:500; margin-bottom:32px; color:#fff;">🎲 Roll Dice</h1>

    <div style="background:#16213e; border-radius:12px; border:0.5px solid rgba(233,69,96,0.15); padding:40px 28px;">
        <p id="dice" style="font-size:100px; margin:0 0 8px;">🎲</p>
        <p id="result" style="font-size:48px; font-weight:500; color:#e94560; margin:0 0 32px;">?</p>
        <div style="margin-bottom:20px;">
            <label style="font-size:12px; color:#666; display:block; margin-bottom:8px;">Dice type</label>
            <select id="sides" style="padding:10px 20px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px;">
                <option value="6">D6</option>
                <option value="4">D4</option>
                <option value="8">D8</option>
                <option value="10">D10</option>
                <option value="12">D12</option>
                <option value="20">D20</option>
                <option value="100">D100</option>
            </select>
        </div>
        <button onclick="roll()" style="width:100%; padding:14px; background:#e94560; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:500; cursor:pointer;">Roll!</button>
    </div>
</div>

<script>
function roll() {
    let sides = parseInt(document.getElementById('sides').value);
    let result = Math.floor(Math.random() * sides) + 1;
    document.getElementById('result').innerText = result;
    document.getElementById('dice').style.transform = 'rotate(360deg)';
    setTimeout(() => document.getElementById('dice').style.transform = '', 300);
}
</script>
{% endblock %}
