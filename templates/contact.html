{% extends "base.html" %}
{% block title %}Contact{% endblock %}
{% block content %}
<div style="max-width:480px; margin:60px auto; padding:0 20px;">

    <p style="font-size:13px; color:#666; margin-bottom:4px;">Contact</p>
    <h1 style="font-size:22px; font-weight:500; margin-bottom:32px; color:#fff;">✉️ Get in Touch</h1>

    <div style="background:#16213e; border-radius:12px; border:0.5px solid rgba(233,69,96,0.15); padding:28px;">
        <div style="margin-bottom:16px;">
            <label style="font-size:12px; color:#666; display:block; margin-bottom:6px;">Name</label>
            <input type="text" id="name" placeholder="Your name" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px;">
        </div>
        <div style="margin-bottom:16px;">
            <label style="font-size:12px; color:#666; display:block; margin-bottom:6px;">Email</label>
            <input type="email" id="email" placeholder="you@example.com" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px;">
        </div>
        <div style="margin-bottom:20px;">
            <label style="font-size:12px; color:#666; display:block; margin-bottom:6px;">Message</label>
            <textarea id="message" placeholder="Write your message..." rows="5" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px; resize:vertical;"></textarea>
        </div>
        <button onclick="sendMsg()" style="width:100%; padding:12px; background:#e94560; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer;">Send Message</button>
        <div id="success" style="display:none; margin-top:16px; padding:12px; background:rgba(78,204,163,0.1); border:0.5px solid rgba(78,204,163,0.3); border-radius:8px; text-align:center; color:#4ecca3; font-size:13px;">Message sent! I'll get back to you soon.</div>
    </div>

    <div style="margin-top:24px; display:flex; gap:12px; justify-content:center;">
    <a href="https://github.com/Makanaref" target="_blank" style="padding:10px 20px; background:#16213e; border:0.5px solid rgba(233,69,96,0.15); border-radius:8px; color:#ccc; text-decoration:none; font-size:13px;">GitHub</a>
    <a href="/about" style="padding:10px 20px; background:#16213e; border:0.5px solid rgba(233,69,96,0.15); border-radius:8px; color:#ccc; text-decoration:none; font-size:13px;">About Me</a>
</div>
</div>

<script>
async function sendMsg() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();
    if (!name || !email || !message) { alert("Please fill all fields!"); return; }

    const btn = document.querySelector('button[onclick="sendMsg()"]');
    const originalText = btn.innerText;
    btn.disabled = true;
    btn.innerText = "Sending...";

    try {
        const res = await fetch("/api/contact", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, message })
        });
        const data = await res.json();
        if (res.ok && data.success) {
            document.getElementById("success").style.display = "block";
            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("message").value = "";
        } else {
            alert(data.error || "Something went wrong. Please try again.");
        }
    } catch (err) {
        alert("Network error. Please try again.");
    } finally {
        btn.disabled = false;
        btn.innerText = originalText;
    }
}
</script>
{% endblock %}
