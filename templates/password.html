{% extends "base.html" %}
{% block title %}Password Generator{% endblock %}
{% block content %}
<div style="max-width:480px; margin:60px auto; padding:0 20px;">

    <p style="font-size:13px; color:#666; margin-bottom:4px;">Password Generator</p>
    <h1 style="font-size:22px; font-weight:500; margin-bottom:32px; color:#fff;">🔑 Generate Password</h1>

    <div style="background:#16213e; border-radius:12px; border:0.5px solid rgba(233,69,96,0.15); padding:28px;">
        <div style="margin-bottom:20px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <label style="font-size:12px; color:#666;">Length</label>
                <span id="len-val" style="font-size:12px; color:#e94560;">16</span>
            </div>
            <input type="range" id="length" min="6" max="64" value="16" oninput="document.getElementById('len-val').innerText=this.value" style="width:100%; accent-color:#e94560;">
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
            <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:#ccc; cursor:pointer;">
                <input type="checkbox" id="upper" checked style="accent-color:#e94560;"> Uppercase
            </label>
            <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:#ccc; cursor:pointer;">
                <input type="checkbox" id="lower" checked style="accent-color:#e94560;"> Lowercase
            </label>
            <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:#ccc; cursor:pointer;">
                <input type="checkbox" id="numbers" checked style="accent-color:#e94560;"> Numbers
            </label>
            <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:#ccc; cursor:pointer;">
                <input type="checkbox" id="symbols" style="accent-color:#e94560;"> Symbols
            </label>
        </div>
        <button onclick="generate()" style="width:100%; padding:12px; background:#e94560; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer;">Generate</button>
        <div id="result" style="display:none; margin-top:16px;">
            <div style="background:#0f3460; border-radius:8px; padding:16px; display:flex; justify-content:space-between; align-items:center; gap:12px;">
                <p id="pwd" style="font-size:14px; color:#fff; margin:0; word-break:break-all; font-family:monospace;"></p>
                <button onclick="copyPwd()" style="padding:6px 14px; background:#e94560; color:#fff; border:none; border-radius:6px; font-size:12px; cursor:pointer; white-space:nowrap;">Copy</button>
            </div>
        </div>
    </div>
</div>

<script>
function generate() {
    let chars = '';
    if (document.getElementById('upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if (document.getElementById('lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
    if (document.getElementById('numbers').checked) chars += '0123456789';
    if (document.getElementById('symbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
    if (!chars) return alert('Select at least one option');
    let len = parseInt(document.getElementById('length').value);
    let pwd = Array.from({length: len}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    document.getElementById('pwd').innerText = pwd;
    document.getElementById('result').style.display = 'block';
}
function copyPwd() {
    navigator.clipboard.writeText(document.getElementById('pwd').innerText);
    alert('Copied!');
}
</script>
{% endblock %}
