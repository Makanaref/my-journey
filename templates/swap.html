{% extends "base.html" %}
{% block title %}Swap{% endblock %}
{% block content %}
<div style="max-width:480px; margin:40px auto; padding:0 20px;">
    <p style="font-size:13px; color:#666; margin-bottom:4px;">Swap</p>
    <h1 style="font-size:22px; font-weight:500; margin-bottom:24px; color:#fff;">🔄 Cross-Chain Swap</h1>
    <div style="border-radius:16px; overflow:hidden; border:0.5px solid rgba(233,69,96,0.15);">
        <iframe
            src="https://transferto.xyz/swap?theme=dark&integrator=sgm-app"
            width="100%"
            height="680"
            frameborder="0"
            style="display:block;">
        </iframe>
    </div>
    <p style="font-size:12px; color:#555; text-align:center; margin-top:12px;">
        Powered by <a href="https://li.fi" target="_blank" style="color:#e94560;">LI.FI</a> — cross-chain swap aggregator
    </p>
</div>
{% endblock %}
