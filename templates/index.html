{% extends "base.html" %}
{% block title %}Home — Makan 🚀{% endblock %}
{% block content %}

<div style="text-align:center; padding: 60px 30px 20px;">

<!-- GM -->
    <div style="margin-bottom:40px;">
        <a href="/gm" style="display:inline-block; text-decoration:none; font-size:3.2em; animation: wave 1.6s infinite;">👋</a>
        <div style="margin-top:8px;">
            <a href="/gm" class="btn" style="font-size:1.1em;">GM</a>
        </div>
    </div>
    <style>
        @keyframes wave {
            0%, 60%, 100% { transform: rotate(0deg); }
            10% { transform: rotate(14deg); }
            20% { transform: rotate(-8deg); }
            30% { transform: rotate(14deg); }
            40% { transform: rotate(-4deg); }
            50% { transform: rotate(10deg); }
        }
    </style>

    <!-- Buttons -->
    <div style="margin-bottom:52px;">
        <a href="/projects" class="btn">My Projects →</a>
        <a href="/about" class="btn-outline">About Me</a>
    </div>

    

    <!-- Blockchain Animation -->
    <div id="chain-anim" style="position:relative; width:100%; max-width:900px; height:260px; margin:0 auto; border-radius:16px; overflow:hidden; background:linear-gradient(180deg, rgba(233,69,96,0.05), rgba(247,179,43,0.02));">
        <canvas id="chain-canvas" style="display:block; width:100%; height:100%;"></canvas>
    </div>

    <script>
    (function () {
        const canvas = document.getElementById('chain-canvas');
        const ctx = canvas.getContext('2d');
        const wrap = document.getElementById('chain-anim');
        let w, h, nodes = [];
        const NODE_COUNT = 24;
        const COLORS = ['#e94560', '#f7b32b', '#4ecdc4'];

        function resize() {
            w = canvas.width = wrap.clientWidth;
            h = canvas.height = wrap.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function rand(min, max) { return Math.random() * (max - min) + min; }

        for (let i = 0; i < NODE_COUNT; i++) {
            nodes.push({
                x: rand(0, w), y: rand(0, h),
                vx: rand(-0.25, 0.25), vy: rand(-0.25, 0.25),
                r: rand(2, 4),
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                pulse: Math.random() * Math.PI * 2
            });
        }

        function step() {
            ctx.clearRect(0, 0, w, h);

            for (let i = 0; i < nodes.length; i++) {
                const n = nodes[i];
                n.x += n.vx; n.y += n.vy; n.pulse += 0.02;
                if (n.x < 0 || n.x > w) n.vx *= -1;
                if (n.y < 0 || n.y > h) n.vy *= -1;

                for (let j = i + 1; j < nodes.length; j++) {
                    const m = nodes[j];
                    const dx = n.x - m.x, dy = n.y - m.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 130) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(233,69,96,${1 - dist / 130})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(n.x, n.y);
                        ctx.lineTo(m.x, m.y);
                        ctx.stroke();
                    }
                }
            }

            for (const n of nodes) {
                const glow = 0.6 + Math.sin(n.pulse) * 0.4;
                ctx.beginPath();
                ctx.fillStyle = n.color;
                ctx.globalAlpha = glow;
                ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            requestAnimationFrame(step);
        }
        step();
    })();
    </script>

</div>

{% endblock %}
