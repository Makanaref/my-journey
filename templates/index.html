{% extends "base.html" %}
{% block title %}Home — Makan 🚀{% endblock %}
{% block content %}

<div style="text-align:center; padding: 60px 30px 20px;">

<!-- GM -->
    <div style="margin-bottom:40px;">
        <a href="/gm" style="display:inline-block; text-decoration:none; font-size:3.2em; animation: wave 1.6s infinite;">👋</a>
        <div style="margin-top:8px;">
            <a href="/gm" class="btn" style="font-size:1.1em;">GM</a>
        </div>
    </div>
    <style>
        @keyframes wave {
            0%, 60%, 100% { transform: rotate(0deg); }
            10% { transform: rotate(14deg); }
            20% { transform: rotate(-8deg); }
            30% { transform: rotate(14deg); }
            40% { transform: rotate(-4deg); }
            50% { transform: rotate(10deg); }
        }
    </style>

    <!-- Buttons -->
    <div style="margin-bottom:52px;">
        <a href="/projects" class="btn">My Projects →</a>
        <a href="/about" class="btn-outline">About Me</a>
    </div>

    

    <!-- Divider -->
    <hr style="border:none; border-top:1px solid rgba(233,69,96,0.12); margin:0 auto 36px; max-width:500px;">

    <!-- Quick links -->
    <div style="margin-bottom:20px;">
        <a href="/weather" class="btn-outline" style="margin:6px;">🌤️ Weather</a>
        <a href="/currency" class="btn-outline" style="margin:6px;">💱 Currency</a>
        <a href="/contact" class="btn-outline" style="margin:6px;">✉️ Contact</a>
    </div>

</div>

{% endblock %}
