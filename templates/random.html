{% extends "base.html" %}
{% block title %}Random Number{% endblock %}
{% block content %}
    <h1>Random Number 🎲</h1>
    <div class="card">
        <input type="number" id="min" placeholder="Min" value="1" style="width:90%;padding:12px;border-radius:8px;border:none;background:#0f3460;color:white;font-size:1em;">
        <input type="number" id="max" placeholder="Max" value="100" style="width:90%;padding:12px;border-radius:8px;border:none;background:#0f3460;color:white;font-size:1em;">
        <br><br>
        <button class="btn" onclick="generate()">Generate!</button>
        <h2 id="result" style="font-size:5em;color:#e94560;margin-top:20px;"></h2>
    </div>
    <script>
        function generate() {
            const min = parseInt(document.getElementById("min").value);
            const max = parseInt(document.getElementById("max").value);
            const num = Math.floor(Math.random() * (max - min + 1)) + min;
            document.getElementById("result").innerText = num;
        }
    </script>
{% endblock %}
