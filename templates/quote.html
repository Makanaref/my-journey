{% extends "base.html" %}
{% block title %}Quote{% endblock %}
{% block content %}
<div style="max-width:480px; margin:60px auto; padding:0 20px; text-align:center;">

    <p style="font-size:13px; color:#666; margin-bottom:4px;">Quote</p>
    <h1 style="font-size:22px; font-weight:500; margin-bottom:32px; color:#fff;">💬 Daily Quote</h1>

    <div style="background:#16213e; border-radius:12px; border:0.5px solid rgba(233,69,96,0.15); padding:36px 28px;">
        <p style="font-size:32px; color:#e94560; margin:0 0 16px;">"</p>
        <p id="quote-text" style="font-size:16px; color:#ccc; line-height:1.8; margin:0 0 16px; font-style:italic;"></p>
        <p id="quote-author" style="font-size:13px; color:#666; margin:0 0 28px;"></p>
        <button onclick="newQuote()" style="width:100%; padding:12px; background:#e94560; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer;">New Quote</button>
    </div>
</div>

<script>
const quotes = [
    {text: "The only way to do great work is to love what you do.", author: "Steve Jobs"},
    {text: "Life is what happens when you're busy making other plans.", author: "John Lennon"},
    {text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt"},
    {text: "It is during our darkest moments that we must focus to see the light.", author: "Aristotle"},
    {text: "Whoever is happy will make others happy too.", author: "Anne Frank"},
    {text: "Do not go where the path may lead, go instead where there is no path and leave a trail.", author: "Ralph Waldo Emerson"},
    {text: "You will face many defeats in life, but never let yourself be defeated.", author: "Maya Angelou"},
    {text: "In the end, it's not the years in your life that count. It's the life in your years.", author: "Abraham Lincoln"},
    {text: "Never let the fear of striking out keep you from playing the game.", author: "Babe Ruth"},
    {text: "Life is either a daring adventure or nothing at all.", author: "Helen Keller"}
];
function newQuote() {
    let q = quotes[Math.floor(Math.random() * quotes.length)];
    document.getElementById('quote-text').innerText = q.text;
    document.getElementById('quote-author').innerText = '— ' + q.author;
}
newQuote();
</script>
{% endblock %}
