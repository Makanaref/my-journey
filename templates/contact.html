{% extends "base.html" %}
{% block title %}Contact Me{% endblock %}
{% block content %}
    <h1>Contact Me 📬</h1>
    <div class="card">
        <p>Have a question? Send me a message!</p>
        <br>
        <input type="text" placeholder="Your Name" style="width:90%;padding:12px;margin:10px 0;border-radius:8px;border:none;background-color:#0f3460;color:white;font-size:1em;">
        <input type="email" placeholder="Your Email" style="width:90%;padding:12px;margin:10px 0;border-radius:8px;border:none;background-color:#0f3460;color:white;font-size:1em;">
        <textarea rows="5" placeholder="Your Message" style="width:90%;padding:12px;margin:10px 0;border-radius:8px;border:none;background-color:#0f3460;color:white;font-size:1em;"></textarea>
        <br>
        <button class="btn" onclick="alert('Message sent! Thanks :)')">Send Message</button>
    </div>
{% endblock %}
