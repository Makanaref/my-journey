{% extends "base.html" %}
{% block title %}Typing Speed Test{% endblock %}
{% block content %}
    <h1>Typing Speed Test ⌨️</h1>
    <div class="card">
        <p id="sample" style="color:#aaa;font-size:1.2em;line-height:2;">The quick brown fox jumps over the lazy dog. Python is an amazing programming language that is easy to learn and powerful to use.</p>
    </div>
    <div class="card">
        <textarea id="input" rows="4" placeholder="Start typing here..." oninput="check()" style="width:90%;padding:12px;border-radius:8px;border:none;background:#0f3460;color:white;font-size:1em;"></textarea>
        <br><br>
        <button class="btn" onclick="reset()">Reset</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:20px;">
        <div class="card" style="width:150px;padding:20px;">
            <h2 id="wpm" style="color:#e94560;">0</h2>
            <p>WPM</p>
        </div>
        <div class="card" style="width:150px;padding:20px;">
            <h2 id="accuracy" style="color:#e94560;">0%</h2>
            <p>Accuracy</p>
        </div>
        <div class="card" style="width:150px;padding:20px;">
            <h2 id="time" style="color:#e94560;">0s</h2>
            <p>Time</p>
        </div>
    </div>
    <script>
        let startTime = null;
        const sample = document.getElementById("sample").innerText;

        function check() {
            const input = document.getElementById("input").value;
            if (!startTime && input.length > 0) startTime = new Date();
            const elapsed = (new Date() - startTime) / 1000 / 60;
            const words = input.trim().split(/\s+/).length;
            const wpm = Math.round(words / elapsed) || 0;
            let correct = 0;
            for (let i = 0; i < input.length; i++) {
                if (input[i] === sample[i]) correct++;
            }
            const accuracy = input.length > 0 ? Math.round((correct / input.length) * 100) : 0;
            const secs = Math.round((new Date() - startTime) / 1000) || 0;
            document.getElementById("wpm").innerText = wpm;
            document.getElementById("accuracy").innerText = accuracy + "%";
            document.getElementById("time").innerText = secs + "s";
        }

        function reset() {
            startTime = null;
            document.getElementById("input").value = "";
            document.getElementById("wpm").innerText = "0";
            document.getElementById("accuracy").innerText = "0%";
            document.getElementById("time").innerText = "0s";
        }
    </script>
{% endblock %}
