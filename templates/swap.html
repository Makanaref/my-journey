{% extends "base.html" %}
{% block title %}Swap{% endblock %}
{% block content %}
<div style="max-width:480px; margin:40px auto; padding:0 20px;">
    <p style="font-size:13px; color:#666; margin-bottom:4px;">Swap</p>
    <h1 style="font-size:22px; font-weight:500; margin-bottom:32px; color:#fff;">🔄 Cross-Chain Swap</h1>
    <div id="lifi-widget"></div>
</div>

<script type="module">
import { LiFiWidget } from 'https://cdn.jsdelivr.net/npm/@lifi/widget@3/dist/index.min.js';

const widget = LiFiWidget.init({
    elementId: 'lifi-widget',
    config: {
        appearance: 'dark',
        theme: {
            palette: {
                primary: { main: '#e94560' },
                secondary: { main: '#0f3460' },
                background: { default: '#1a1a2e', paper: '#16213e' },
            },
            shape: { borderRadius: 12 },
        },
        chains: {
            allow: [8453, 57073, 43114, 3946, 10849, 4663, 98866, 7000]
        },
        integrator: 'sgm-app',
    }
});
</script>
{% endblock %}
