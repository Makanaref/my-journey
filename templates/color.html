{% extends "base.html" %}
{% block title %}Color Picker{% endblock %}
{% block content %}
    <h1>Color Picker 🎨</h1>
    <div class="card">
        <input type="color" id="picker" value="#e94560" style="width:100px;height:100px;border:none;cursor:pointer;border-radius:50%;">
        <br><br>
        <h2 id="hex" style="color:#e94560;">#e94560</h2>
        <p id="rgb" style="color:#aaa;"></p>
        <br>
        <div id="preview" style="width:200px;height:200px;border-radius:12px;margin:0 auto;background:#e94560;"></div>
        <br>
        <button class="btn" onclick="copy()">Copy HEX 📋</button>
    </div>
    <script>
        document.getElementById("picker").addEventListener("input", function() {
            const hex = this.value;
            const r = parseInt(hex.slice(1,3),16);
            const g = parseInt(hex.slice(3,5),16);
            const b = parseInt(hex.slice(5,7),16);
            document.getElementById("hex").innerText = hex;
            document.getElementById("hex").style.color = hex;
            document.getElementById("rgb").innerText = "RGB: " + r + ", " + g + ", " + b;
            document.getElementById("preview").style.background = hex;
        });
        function copy() {
            navigator.clipboard.writeText(document.getElementById("hex").innerText);
            alert("Copied!");
        }
    </script>
{% endblock %}
