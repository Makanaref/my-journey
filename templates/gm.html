{% extends "base.html" %}
{% block title %}GM{% endblock %}
{% block content %}
<style>
    .gm-wrap { max-width: 480px; margin: 0 auto; padding: 50px 20px; text-align: center; }
    .gm-orb {
        width: 96px; height: 96px; margin: 0 auto 24px;
        border-radius: 50%;
        background: #1a1024;
        border: 1px solid rgba(233,69,96,0.4);
        display: flex; align-items: center; justify-content: center;
        font-size: 2.4em;
        position: relative;
    }
    .gm-orb::after {
        content: "";
        position: absolute; inset: -12px;
        border-radius: 50%;
        border: 1px solid rgba(233,69,96,0.15);
    }
    .gm-title { font-size: 2.2em; margin-bottom: 6px; letter-spacing: -0.5px; }
    .gm-sub { color: #777; font-size: 0.95em; margin-bottom: 28px; }
    .wallet-pill {
        display: inline-flex; align-items: center; gap: 8px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        padding: 9px 18px; border-radius: 30px;
        font-size: 0.85em; color: #bbb; font-family: monospace;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .section-label {
        font-size: 0.72em; color: #666; text-transform: uppercase;
        letter-spacing: 1.5px; margin: 32px 0 12px; text-align: left;
    }
    .net-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .net-card {
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 12px; padding: 16px;
        cursor: pointer; transition: all 0.2s; text-align: left;
    }
    .net-card:hover { border-color: rgba(233,69,96,0.4); background: rgba(255,255,255,0.04); }
    .net-card.active { border-color: #e94560; background: rgba(233,69,96,0.07); }
    .net-card .symbol { font-size: 1.1em; font-weight: 600; color: #fff; }
    .net-card .name { color: #777; font-size: 0.8em; margin-top: 2px; }
    .gm-action { display: flex; flex-direction: column; align-items: center; margin-top: 36px; }
    .gm-button {
        width: 140px; height: 140px; border-radius: 50%;
        background: #e94560;
        border: none; color: white; font-size: 1.15em; font-weight: 600;
        cursor: pointer; transition: transform 0.15s, background 0.15s;
    }
    .gm-button:hover { background: #d63951; transform: scale(1.03); }
    .gm-button:active { transform: scale(0.97); }
    .gm-button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .status-msg { min-height: 20px; color: #777; font-size: 0.85em; margin-top: 14px; }
    .stat-row { display: flex; justify-content: center; gap: 12px; margin-top: 22px; }
    .stat-box {
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px; padding: 14px 28px; min-width: 100px;
    }
    .stat-box .num { font-size: 1.6em; color: #fff; font-weight: 600; }
    .stat-box .lbl { color: #666; font-size: 0.72em; margin-top: 4px; letter-spacing: 0.5px; }
    .lb-wrap {
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 14px; padding: 18px; margin-top: 36px; text-align: left;
    }
    .lb-title { font-size: 0.85em; color: #999; margin-bottom: 14px; text-align: center; letter-spacing: 0.5px; }
    .lb-row {
        display: flex; justify-content: space-between; align-items: center;
        padding: 10px 14px; border-radius: 8px; margin-bottom: 6px;
        background: rgba(255,255,255,0.02);
    }
    .lb-row.top1 { background: rgba(233,69,96,0.08); border: 1px solid rgba(233,69,96,0.2); }
    .lb-rank { font-weight: 600; color: #555; width: 28px; font-size: 0.85em; }
    .lb-row.top1 .lb-rank { color: #e94560; }
    .lb-addr { font-family: monospace; color: #ccc; font-size: 0.85em; }
    .lb-score { color: #4ade80; font-weight: 600; font-size: 0.85em; }

    /* === LAMPS === */
    .lamps-scene {
        background: #0a0a14;
        border-radius: 0 0 12px 12px;
        padding-bottom: 16px;
        margin-bottom: 0;
        overflow: hidden;
    }
    .lamps-ceiling { width: 100%; height: 2px; background: #1e1e30; }
    .lamps-row { display: flex; justify-content: center; align-items: flex-start; padding: 0 20px; }
    .lamp { display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; }
    .lamp-wire { width: 1px; background: #2a2a40; }
    .lamp-cap { background: #2a2a40; border-radius: 1px 1px 0 0; }
    .lamp-bulb {
        border-radius: 50% 50% 45% 45% / 55% 55% 45% 45%;
        border: 1px solid #2a2a40;
        background: #141422;
        transition: all 0.5s ease;
        position: relative;
        margin-top: -1px;
    }
    .lamp-bulb.on {
        border-color: rgba(233,69,96,0.5);
        background: radial-gradient(circle at 50% 38%, #ff7050 0%, #e94560 50%, #6b1020 100%);
    }
    .lamp-glow {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.5s ease;
        left: 50%;
        transform: translateX(-50%);
        background: radial-gradient(circle, rgba(233,69,96,0.15) 0%, transparent 70%);
    }
    .lamp-glow.on { opacity: 1; }
    .lamps-count { text-align: center; color: #444; font-size: 11px; font-family: monospace; margin-top: 12px; }
    .lamps-count span { color: #e94560; }
</style>

<!-- Lamps scene (بالای صفحه، بدون padding) -->
<div class="lamps-scene">
    <div class="lamps-ceiling"></div>
    <div class="lamps-row" id="lamps-row"></div>
    <div class="lamps-count" id="lamps-count"><span>0</span> GM today</div>
</div>

<div class="gm-wrap">
    <div class="gm-orb">👋</div>
    <h1 class="gm-title">GM</h1>
    <p class="gm-sub">Say good morning onchain, every day.</p>

    <div id="connect-section">
        <button class="btn" onclick="connectWallet()" style="padding:12px 32px;">Connect wallet</button>
    </div>

    <div id="wallet-info" style="display:none;">
        <span class="wallet-pill"><span class="dot"></span><span id="wallet-addr"></span></span>
    </div>

    <div id="network-card" style="display:none;">
        <p class="section-label">Choose network</p>
        <div class="net-grid">
            <div class="net-card" id="net-lamina1" onclick="switchNetwork('lamina1')">
                <div class="symbol">L1</div>
                <div class="name">Lamina1</div>
            </div>
            <div class="net-card" id="net-nexus" onclick="switchNetwork('nexus')">
                <div class="symbol">NEX</div>
                <div class="name">Nexus</div>
            </div>
            <div class="net-card" id="net-ink" onclick="switchNetwork('ink')">
                <div class="symbol">INK</div>
                <div class="name">Ink</div>
            </div>
            <div class="net-card" id="net-base" onclick="switchNetwork('base')">
                <div class="symbol">BASE</div>
                <div class="name">Base</div>
            </div>
            <div class="net-card" id="net-robinhood" onclick="switchNetwork('robinhood')">
                <div class="symbol">HOOD</div>
                <div class="name">Robinhood</div>
            </div>
        </div>
    </div>

    <div id="gm-card" style="display:none;">
        <div class="gm-action">
            <button class="gm-button" id="gm-button" onclick="sayGM()">GM</button>
            <p class="status-msg" id="tx-status"></p>
        </div>
        <div class="stat-row">
            <div class="stat-box">
                <div class="num" id="my-streak">—</div>
                <div class="lbl">STREAK</div>
            </div>
            <div class="stat-box">
                <div class="num" id="my-score">—</div>
                <div class="lbl">SCORE</div>
            </div>
        </div>
    </div>

    <div id="leaderboard-card" style="display:none;">
        <div class="lb-wrap">
            <p class="lb-title">LEADERBOARD</p>
            <div id="leaderboard-list"></div>
            <div id="lb-pagination" style="display:none; align-items:center; justify-content:center; gap:16px; margin-top:16px;">
                <button id="lb-prev" onclick="leaderboardPrevPage()" class="lb-page-btn">← Prev</button>
                <span id="lb-page-indicator" style="color:#999; font-size:0.85em;"></span>
                <button id="lb-next" onclick="leaderboardNextPage()" class="lb-page-btn">Next →</button>
            </div>
        </div>
    </div>

    <style>
        .lb-page-btn {
            padding:7px 16px; border-radius:8px; font-size:0.85em; font-weight:600;
            border:1px solid rgba(233,69,96,0.35); background:rgba(233,69,96,0.08);
            color:#e94560; cursor:pointer;
            transition:background 0.2s ease, transform 0.2s ease;
        }
        .lb-page-btn:hover:not(:disabled) { background:rgba(233,69,96,0.18); transform:translateY(-1px); }
        .lb-page-btn:disabled { opacity:0.35; cursor:not-allowed; }
    </style>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
<script>
    /* === LAMPS === */
    const LAMP_CFG = [
        {w:44,s:20,g:60},{w:64,s:24,g:72},{w:34,s:18,g:54},
        {w:78,s:26,g:80},{w:50,s:22,g:66},{w:38,s:19,g:58},{w:60,s:23,g:70}
    ];
    function buildLamps() {
        const row = document.getElementById('lamps-row');
        LAMP_CFG.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'lamp';
            div.innerHTML = `
                <div class="lamp-wire" style="height:${c.w}px"></div>
                <div class="lamp-cap" style="width:${Math.round(c.s*0.5)}px;height:5px"></div>
                <div class="lamp-bulb" id="bulb-${i}" style="width:${c.s}px;height:${c.s+3}px;">
                    <div class="lamp-glow" id="glow-${i}" style="width:${c.g}px;height:${c.g}px;top:${Math.round(c.s*0.2)}px;"></div>
                </div>
            `;
            row.appendChild(div);
        });
    }
    function updateLamps(count) {
        LAMP_CFG.forEach((_, i) => {
            document.getElementById('bulb-'+i).classList.toggle('on', i < count);
            document.getElementById('glow-'+i).classList.toggle('on', i < count);
        });
        document.getElementById('lamps-count').innerHTML = `<span>${count}</span> GM today`;
    }
    buildLamps();

    /* === WALLET & CONTRACT === */
    let provider, signer, account, contract, currentNet;
    const CONTRACT_ADDRESSES = {
        lamina1:   "0x91A68410C13866d1c4262C012680A623B79BeF20",
        nexus:     "0x91A68410C13866d1c4262C012680A623B79BeF20",
        ink:       "0xc5B1Bb3e6CE937F64440895a6b976455F64dbaAE",
        base:      "0x0d246A70E2c9ddCDacF690E854E9a528aaE9c3f6",
        robinhood: "0xEC76D7a9801Fd7De132b299a36B6E0125802430B"
    };
    const CONTRACT_ABI = [
        "function sayGM() public",
        "function getStats(address user) public view returns (uint256 streak, uint256 totalScoreX100, uint256 lastGmDay)",
        "function getLeaderboard() public view returns (address[] memory addrs, uint256[] memory streaks, uint256[] memory scoresX100)"
    ];
    const networks = {
        lamina1:   { chainIdHex: "0x" + (10849).toString(16), chainName: "Lamina1",         rpcUrls: ["https://subnets.avax.network/lamina1/mainnet/rpc"], nativeCurrency: { name: "L1",  symbol: "L1",  decimals: 18 }, blockExplorerUrls: ["https://subnets.avax.network/lamina1"] },
        nexus:     { chainIdHex: "0x" + (3946).toString(16),  chainName: "Nexus",            rpcUrls: ["https://mainnet.rpc.nexus.xyz"],                    nativeCurrency: { name: "NEX", symbol: "NEX", decimals: 18 }, blockExplorerUrls: ["https://explorer.nexus.xyz"] },
        ink:       { chainIdHex: "0x" + (57073).toString(16), chainName: "Ink",              rpcUrls: ["https://rpc-gel.inkonchain.com"],                   nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 }, blockExplorerUrls: ["https://explorer.inkonchain.com"] },
        base:      { chainIdHex: "0x" + (8453).toString(16),  chainName: "Base",             rpcUrls: ["https://mainnet.base.org"],                        nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 }, blockExplorerUrls: ["https://basescan.org"] },
        robinhood: { chainIdHex: "0x" + (4663).toString(16),  chainName: "Robinhood Chain",  rpcUrls: ["https://rpc.mainnet.chain.robinhood.com"],          nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 }, blockExplorerUrls: ["https://robinhoodchain.blockscout.com"] }
    };

    async function connectWallet() {
        if (!window.ethereum) { alert("Please install MetaMask!"); return; }
        try {
            provider = new ethers.BrowserProvider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            account = await signer.getAddress();
            document.getElementById("connect-section").style.display = "none";
            document.getElementById("wallet-info").style.display = "block";
            document.getElementById("wallet-addr").innerText = account.slice(0,6) + "..." + account.slice(-4);
            document.getElementById("network-card").style.display = "block";
        } catch (err) { alert("Connection failed: " + err.message); }
    }

    async function switchNetwork(net) {
        const config = networks[net];
        try {
            await window.ethereum.request({ method: "wallet_addEthereumChain", params: [{ chainId: config.chainIdHex, chainName: config.chainName, rpcUrls: config.rpcUrls, nativeCurrency: config.nativeCurrency, blockExplorerUrls: config.blockExplorerUrls }] });
            currentNet = net;
            Object.keys(networks).forEach(n => document.getElementById("net-"+n).classList.remove("active"));
            document.getElementById("net-"+net).classList.add("active");
            provider = new ethers.BrowserProvider(window.ethereum);
            signer = await provider.getSigner();
            account = await signer.getAddress();
            contract = new ethers.Contract(CONTRACT_ADDRESSES[net], CONTRACT_ABI, signer);
            document.getElementById("gm-card").style.display = "block";
            document.getElementById("leaderboard-card").style.display = "block";
            document.getElementById("tx-status").innerText = "";
            await loadStats();
            await loadLeaderboard();
        } catch (err) { alert("Network switch failed: " + err.message); }
    }

    async function sayGM() {
        const btn = document.getElementById("gm-button");
        btn.disabled = true;
        document.getElementById("tx-status").innerText = "Sending transaction...";
        try {
            const gasPriceHex = await provider.send("eth_gasPrice", []);
            const networkGasPrice = BigInt(gasPriceHex);
            const gasPricePercent = { lamina1: 100, nexus: 25, ink: 25, base: 15, robinhood: 100 };
            const percent = BigInt(gasPricePercent[currentNet] ?? 25);
            const gasPrice = networkGasPrice * percent / 100n;
            const txOverrides = { gasPrice };
            if (currentNet === "lamina1") txOverrides.gasLimit = 150000;
            const tx = await contract.sayGM(txOverrides);
            document.getElementById("tx-status").innerText = "Confirming...";
            await tx.wait();
            document.getElementById("tx-status").innerText = "GM confirmed ✅";
            await loadStats();
            await loadLeaderboard();
        } catch (err) {
            const reason = err.reason || err.message || "";
            if (reason.includes("Already said GM today")) {
                document.getElementById("tx-status").innerText = "Once a day. Come back tomorrow 🌅";
            } else {
                document.getElementById("tx-status").innerText = "Failed: " + reason;
            }
        }
        btn.disabled = false;
    }

    const TEHRAN_OFFSET = 12600;
    function todayDayNumber() {
        return Math.floor((Math.floor(Date.now() / 1000) + TEHRAN_OFFSET) / 86400);
    }

    async function loadStats() {
        try {
            const result = await contract.getStats(account);
            document.getElementById("my-streak").innerText = result[0].toString();
            document.getElementById("my-score").innerText = (Number(result[1]) / 100).toFixed(2);
            const lastGmDay = Number(result[2]);
            const btn = document.getElementById("gm-button");
            const statusEl = document.getElementById("tx-status");
            if (lastGmDay === todayDayNumber()) {
                btn.disabled = true;
                btn.style.opacity = "0.5";
                btn.style.cursor = "not-allowed";
                statusEl.innerText = "Already said GM today. Come back tomorrow 🌅";
            } else {
                btn.disabled = false;
                btn.style.opacity = "1";
                btn.style.cursor = "pointer";
                statusEl.innerText = "";
            }
        } catch (err) { console.log(err); }
    }

    let leaderboardRows = [];
    let leaderboardPage = 0;
    const LB_PAGE_SIZE = 10;

    async function loadLeaderboard() {
        try {
            const result = await contract.getLeaderboard();
            const addrs = result[0], streaks = result[1], scores = result[2];
            let rows = [];
            for (let i = 0; i < addrs.length; i++) {
                rows.push({ addr: addrs[i], streak: Number(streaks[i]), score: Number(scores[i]) / 100 });
            }
            rows.sort((a, b) => b.score - a.score);
            leaderboardRows = rows;
            leaderboardPage = 0;
            updateLamps(Math.min(rows.length, LAMP_CFG.length));
            renderLeaderboardPage();
        } catch (err) { console.log(err); }
    }

    function renderLeaderboardPage() {
        const listEl = document.getElementById("leaderboard-list");
        const paginationEl = document.getElementById("lb-pagination");
        if (leaderboardRows.length === 0) {
            listEl.innerHTML = "<p style='color:#666;text-align:center;font-size:0.85em;'>No GMs yet. Be the first.</p>";
            paginationEl.style.display = "none";
            return;
        }
        const totalPages = Math.ceil(leaderboardRows.length / LB_PAGE_SIZE);
        const start = leaderboardPage * LB_PAGE_SIZE;
        const pageRows = leaderboardRows.slice(start, start + LB_PAGE_SIZE);
        listEl.innerHTML = pageRows.map((r, i) => `
            <div class="lb-row ${start + i === 0 ? 'top1' : ''}">
                <span class="lb-rank">#${start + i + 1}</span>
                <span class="lb-addr">${r.addr.slice(0,6)}...${r.addr.slice(-4)}</span>
                <span class="lb-score">${r.score.toFixed(2)}</span>
            </div>
        `).join("");
        if (totalPages > 1) {
            paginationEl.style.display = "flex";
            document.getElementById("lb-page-indicator").innerText = `Page ${leaderboardPage + 1} of ${totalPages}`;
            document.getElementById("lb-prev").disabled = leaderboardPage === 0;
            document.getElementById("lb-next").disabled = leaderboardPage >= totalPages - 1;
        } else {
            paginationEl.style.display = "none";
        }
    }

    function leaderboardPrevPage() { if (leaderboardPage > 0) { leaderboardPage--; renderLeaderboardPage(); } }
    function leaderboardNextPage() { const t = Math.ceil(leaderboardRows.length / LB_PAGE_SIZE); if (leaderboardPage < t - 1) { leaderboardPage++; renderLeaderboardPage(); } }
</script>
{% endblock %}
