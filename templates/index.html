{% extends "base.html" %}
{% block title %}Home — Makan 🚀{% endblock %}
{% block content %}

<div style="text-align:center; padding: 60px 30px 20px;">

<!-- Hero -->
    <div style="position:relative; max-width:640px; margin:0 auto;">

        <div style="position:absolute; top:-40px; left:50%; transform:translateX(-50%); width:340px; height:340px; background:radial-gradient(circle, rgba(233,69,96,0.18), rgba(0,0,0,0) 70%); filter:blur(10px); pointer-events:none; z-index:0;"></div>

        <div style="position:relative; z-index:1;">

            <div style="opacity:0; animation: fadeUp 0.6s ease forwards;">
                <div style="position:relative; width:92px; height:92px; margin:0 auto 22px;">
                    <div style="position:absolute; inset:-6px; border-radius:50%; background:conic-gradient(from 0deg, #e94560, #f7b32b, #e94560); animation: spin 6s linear infinite; opacity:0.75;"></div>
                    <div style="position:absolute; inset:3px; border-radius:50%; background:#161c2e; display:flex; align-items:center; justify-content:center; font-size:2.1em;">
                        <a href="/gm" style="text-decoration:none; display:inline-block; animation: wave 1.6s infinite;">👋</a>
                    </div>
                </div>
            </div>

            <h1 style="margin:0 0 6px; font-size:2.6em; font-weight:800; letter-spacing:-0.02em; background:linear-gradient(90deg, #ffffff, #e94560 60%, #f7b32b); -webkit-background-clip:text; background-clip:text; color:transparent; opacity:0; animation: fadeUp 0.6s ease 0.1s forwards;">
                Makan
            </h1>

            <p style="margin:0 0 18px; color:rgba(255,255,255,0.45); font-size:0.95em; letter-spacing:0.04em; text-transform:uppercase; opacity:0; animation: fadeUp 0.6s ease 0.15s forwards;">
                Python &amp; Flask Developer
            </p>

            <div style="display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:26px; opacity:0; animation: fadeUp 0.6s ease 0.2s forwards;">
                <span style="display:inline-flex; align-items:center; gap:8px; padding:6px 16px; border-radius:999px; border:1px solid rgba(46,204,113,0.35); background:rgba(46,204,113,0.08); font-size:0.85em; color:#2ecc71;">
                    <span style="width:8px; height:8px; border-radius:50%; background:#2ecc71; box-shadow:0 0 8px #2ecc71; animation: blinkDot 1.8s infinite;"></span>
                    Available for work
                </span>
                <a href="/gm" class="gm-pill" style="display:inline-flex; align-items:center; gap:6px; padding:6px 16px; border-radius:999px; border:1px solid rgba(233,69,96,0.35); background:rgba(233,69,96,0.08); font-size:0.85em; color:#e94560; text-decoration:none;">
                    Say GM
                </a>
            </div>

            <p style="color:rgba(255,255,255,0.5); font-size:1.05em; max-width:460px; margin:0 auto 36px; line-height:1.7; opacity:0; animation: fadeUp 0.6s ease 0.25s forwards;">
                Building things with Python, Flask &amp; a bit of curiosity ✨
            </p>

            <div style="display:flex; align-items:center; justify-content:center; gap:14px; flex-wrap:wrap; margin-bottom:52px; opacity:0; animation: fadeUp 0.6s ease 0.3s forwards;">
                <a href="/projects" class="hero-cta-primary">My Projects <span style="display:inline-block; transition:transform 0.25s ease;">→</span></a>
                <a href="/about" class="hero-cta-outline">About Me</a>
            </div>

        </div>
    </div>

    <style>
        @keyframes wave {
            0%, 60%, 100% { transform: rotate(0deg); }
            10% { transform: rotate(14deg); }
            20% { transform: rotate(-8deg); }
            30% { transform: rotate(14deg); }
            40% { transform: rotate(-4deg); }
            50% { transform: rotate(10deg); }
        }
        @keyframes blinkDot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .hero-cta-primary {
            display:inline-flex; align-items:center; gap:8px;
            padding:13px 28px; border-radius:12px; font-weight:700; font-size:1em;
            text-decoration:none; color:#fff;
            background:linear-gradient(135deg, #e94560, #f7253a);
            box-shadow:0 8px 20px rgba(233,69,96,0.3);
            transition:transform 0.25s ease, box-shadow 0.25s ease;
        }
        .hero-cta-primary:hover {
            transform:translateY(-3px);
            box-shadow:0 12px 28px rgba(233,69,96,0.45);
        }
        .hero-cta-primary:hover span { transform:translateX(4px); }
        .hero-cta-outline {
            display:inline-flex; align-items:center;
            padding:13px 28px; border-radius:12px; font-weight:600; font-size:1em;
            text-decoration:none; color:#fff;
            border:1px solid rgba(255,255,255,0.18);
            background:rgba(255,255,255,0.03);
            transition:transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
        }
        .hero-cta-outline:hover {
            transform:translateY(-3px);
            background:rgba(255,255,255,0.07);
            border-color:rgba(255,255,255,0.3);
        }
        .gm-pill {
            transition:transform 0.2s ease, background 0.2s ease;
        }
        .gm-pill:hover {
            transform:translateY(-2px);
            background:rgba(233,69,96,0.16);
        }
    </style>

    

    <!-- Blockchain Animation -->
    <div id="chain-anim" style="position:relative; width:100%; max-width:900px; height:220px; margin:0 auto; border-radius:16px; overflow:hidden; background:radial-gradient(ellipse at center, rgba(233,69,96,0.06), rgba(0,0,0,0) 70%);">
        <canvas id="chain-canvas" style="display:block; width:100%; height:100%;"></canvas>
    </div>

    <script>
    (function () {
        const canvas = document.getElementById('chain-canvas');
        const ctx = canvas.getContext('2d');
        const wrap = document.getElementById('chain-anim');
        let w, h, blocks = [], particles = [];

        function rand(min, max) { return Math.random() * (max - min) + min; }

        function roundRect(x, y, size, r) {
            const half = size / 2;
            ctx.beginPath();
            ctx.moveTo(x - half + r, y - half);
            ctx.arcTo(x + half, y - half, x + half, y + half, r);
            ctx.arcTo(x + half, y + half, x - half, y + half, r);
            ctx.arcTo(x - half, y + half, x - half, y - half, r);
            ctx.arcTo(x - half, y - half, x + half, y - half, r);
            ctx.closePath();
        }

        function buildScene() {
            const count = w < 640 ? 4 : 6;
            blocks = [];
            const marginX = w * 0.14;
            const usable = w - marginX * 2;
            for (let i = 0; i < count; i++) {
                blocks.push({
                    x: marginX + (count === 1 ? 0 : (usable / (count - 1)) * i),
                    y: h / 2,
                    size: 46,
                    hash: '0x' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0')
                });
            }
            particles = [];
            for (let i = 0; i < 14; i++) {
                particles.push({
                    x: rand(0, w), y: rand(0, h),
                    vx: rand(-0.04, 0.04), vy: rand(-0.04, 0.04),
                    r: rand(1, 1.6), a: rand(0.06, 0.16)
                });
            }
        }

        function resize() {
            w = canvas.width = wrap.clientWidth;
            h = canvas.height = wrap.clientHeight;
            buildScene();
        }
        window.addEventListener('resize', resize);
        resize();

        let t = 0;

        function step() {
            ctx.clearRect(0, 0, w, h);
            t += 0.006;

            for (const p of particles) {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > w) p.vx *= -1;
                if (p.y < 0 || p.y > h) p.vy *= -1;
                ctx.beginPath();
                ctx.fillStyle = `rgba(255,255,255,${p.a})`;
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let i = 0; i < blocks.length - 1; i++) {
                const a = blocks[i], b = blocks[i + 1];
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(233,69,96,0.35)';
                ctx.lineWidth = 2;
                ctx.moveTo(a.x + a.size / 2, a.y);
                ctx.lineTo(b.x - b.size / 2, b.y);
                ctx.stroke();
            }

            const totalSegments = blocks.length - 1;
            const progress = (t % 1) * totalSegments;
            const segIndex = Math.min(Math.floor(progress), totalSegments - 1);
            const segT = progress - segIndex;
            const pa = blocks[segIndex], pb = blocks[segIndex + 1];
            const px = pa.x + (pb.x - pa.x) * segT;
            const py = pa.y + (pb.y - pa.y) * segT;

            const glowGrad = ctx.createRadialGradient(px, py, 0, px, py, 22);
            glowGrad.addColorStop(0, 'rgba(247,179,43,0.9)');
            glowGrad.addColorStop(1, 'rgba(247,179,43,0)');
            ctx.beginPath();
            ctx.fillStyle = glowGrad;
            ctx.arc(px, py, 22, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.fillStyle = '#f7b32b';
            ctx.arc(px, py, 3.5, 0, Math.PI * 2);
            ctx.fill();

            blocks.forEach((b, idx) => {
                const isLit = (idx === segIndex && segT < 0.5) || (idx === segIndex + 1 && segT >= 0.5) || (idx === 0 && segIndex === 0 && segT < 0.15);
                roundRect(b.x, b.y, b.size, 8);
                ctx.fillStyle = 'rgba(22,28,46,0.9)';
                ctx.fill();
                ctx.lineWidth = isLit ? 2 : 1.2;
                ctx.strokeStyle = isLit ? '#f7b32b' : 'rgba(233,69,96,0.55)';
                ctx.stroke();

                ctx.fillStyle = 'rgba(255,255,255,0.85)';
                ctx.font = '11px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('#' + (idx + 1), b.x, b.y + 4);

                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.font = '9px monospace';
                ctx.fillText(b.hash, b.x, b.y + b.size / 2 + 16);
            });

            requestAnimationFrame(step);
        }
        step();
    })();
    </script>

</div>

{% endblock %}
