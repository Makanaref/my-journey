{% extends "base.html" %}
{% block title %}BMI Calculator{% endblock %}
{% block content %}
<div style="max-width:440px; margin:60px auto; padding:0 20px;">

    <p style="font-size:13px; color:#666; margin-bottom:4px;">BMI Calculator</p>
    <h1 style="font-size:22px; font-weight:500; margin-bottom:32px; color:#fff;">⚖️ BMI</h1>

    <div style="background:#16213e; border-radius:12px; border:0.5px solid rgba(233,69,96,0.15); padding:28px;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
            <div>
                <label style="font-size:12px; color:#666; display:block; margin-bottom:6px;">Weight (kg)</label>
                <input type="number" id="weight" placeholder="70" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px;">
            </div>
            <div>
                <label style="font-size:12px; color:#666; display:block; margin-bottom:6px;">Height (cm)</label>
                <input type="number" id="height" placeholder="175" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:14px;">
            </div>
        </div>
        <button onclick="calcBMI()" style="width:100%; padding:12px; background:#e94560; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer;">Calculate</button>
        <div id="result" style="display:none; margin-top:20px; padding:20px; background:#0f3460; border-radius:8px; text-align:center;">
            <p id="bmi-val" style="font-size:40px; font-weight:500; color:#e94560; margin:0;"></p>
            <p id="bmi-cat" style="font-size:14px; color:#ccc; margin:8px 0 0;"></p>
        </div>
    </div>
</div>

<script>
function calcBMI() {
    let w = parseFloat(document.getElementById('weight').value);
    let h = parseFloat(document.getElementById('height').value) / 100;
    if (!w || !h) return;
    let bmi = (w / (h * h)).toFixed(1);
    let cat = bmi < 18.5 ? 'Underweight' : bmi < 25 ? 'Normal weight' : bmi < 30 ? 'Overweight' : 'Obese';
    document.getElementById('bmi-val').innerText = bmi;
    document.getElementById('bmi-cat').innerText = cat;
    document.getElementById('result').style.display = 'block';
}
</script>
{% endblock %}
