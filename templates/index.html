{% extends "base.html" %}
{% block title %}Home — Makan 🚀{% endblock %}
{% block content %}

<div style="text-align:center; padding: 60px 30px 20px;">

<!-- Hero -->
    <div style="position:relative; max-width:640px; margin:0 auto;">

        <div style="position:absolute; top:-30px; left:50%; transform:translateX(-50%); width:340px; height:340px; background:radial-gradient(circle, rgba(233,69,96,0.14), rgba(0,0,0,0) 70%); filter:blur(14px); pointer-events:none; z-index:0;"></div>

        <div style="position:relative; z-index:1; display:flex; align-items:flex-start; justify-content:center; gap:56px; flex-wrap:wrap; transform:translateX(-18px); opacity:0; animation: fadeUp 0.6s ease forwards;">

            <a href="/gm" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:14px;">
                <div class="orb">
                    <div class="orb-glow"></div>
                    <div class="orb-ring"></div>
                    <div class="orb-core">
                        <span class="orb-emoji">👋</span>
                    </div>
                </div>
                <span class="orb-label" style="background:linear-gradient(90deg, #ffffff, #e94560 70%); -webkit-background-clip:text; background-clip:text; color:transparent;">GM</span>
            </a>

            <a href="/games" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:14px;">
                <div class="orb">
                    <div class="orb-glow orb-glow-gold"></div>
                    <div class="orb-ring orb-ring-gold"></div>
                    <div class="orb-core">
                        <span class="orb-emoji orb-emoji-game">🎮</span>
                    </div>
                </div>
                <span class="orb-label" style="color:#f7b32b;">Onchain Game</span>
            </a>

        </div>
    </div>

    <style>
        @keyframes wave {
            0%, 60%, 100% { transform: rotate(0deg); }
            10% { transform: rotate(14deg); }
            20% { transform: rotate(-8deg); }
            30% { transform: rotate(14deg); }
            40% { transform: rotate(-4deg); }
            50% { transform: rotate(10deg); }
        }
        @keyframes floaty {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px) translateX(-18px); }
            to { opacity: 1; transform: translateY(0) translateX(-18px); }
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.55; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.12); }
        }
        .orb {
            position:relative; width:100px; height:100px;
            animation: floaty 3.4s ease-in-out infinite;
        }
        .orb-glow {
            position:absolute; inset:-14px; border-radius:50%;
            background: radial-gradient(circle, rgba(233,69,96,0.55), rgba(233,69,96,0) 70%);
            animation: pulseGlow 2.6s ease-in-out infinite;
            z-index:0;
        }
        .orb-glow-gold {
            background: radial-gradient(circle, rgba(247,179,43,0.55), rgba(247,179,43,0) 70%);
        }
        .orb-ring {
            position:absolute; inset:-4px; border-radius:50%;
            background:conic-gradient(from 0deg, #e94560, #7b2ff7, #e94560);
            animation: spin 5s linear infinite;
            z-index:1;
        }
        .orb-ring-gold {
            background:conic-gradient(from 0deg, #f7b32b, #e94560, #f7b32b);
        }
        .orb-core {
            position:absolute; inset:4px; border-radius:50%;
            background: radial-gradient(circle at 32% 28%, #232a47, #0a0d1a 78%);
            display:flex; align-items:center; justify-content:center;
            font-size:2.15em;
            box-shadow: inset 0 0 18px rgba(0,0,0,0.65), 0 0 26px rgba(233,69,96,0.3);
            z-index:2;
        }
        .orb-emoji {
            display:inline-block;
            animation: wave 1.8s infinite;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.35));
        }
        .orb-emoji-game {
            animation: floaty 2.2s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(247,179,43,0.45));
        }
        .orb-label {
            font-family: Georgia, 'Times New Roman', serif;
            font-size:1.3em;
            font-weight:700;
            letter-spacing:0.04em;
        }
    </style>

    

    <!-- Blockchain Animation -->
    <div id="chain-anim" style="position:relative; width:100%; max-width:900px; height:220px; margin:0 auto; border-radius:16px; overflow:hidden; background:radial-gradient(ellipse at center, rgba(233,69,96,0.06), rgba(0,0,0,0) 70%);">
        <canvas id="chain-canvas" style="display:block; width:100%; height:100%;"></canvas>
    </div>

    <script>
    (function () {
        const canvas = document.getElementById('chain-canvas');
        const ctx = canvas.getContext('2d');
        const wrap = document.getElementById('chain-anim');
        let w, h, blocks = [], particles = [];

        function rand(min, max) { return Math.random() * (max - min) + min; }

        function roundRect(x, y, size, r) {
            const half = size / 2;
            ctx.beginPath();
            ctx.moveTo(x - half + r, y - half);
            ctx.arcTo(x + half, y - half, x + half, y + half, r);
            ctx.arcTo(x + half, y + half, x - half, y + half, r);
            ctx.arcTo(x - half, y + half, x - half, y - half, r);
            ctx.arcTo(x - half, y - half, x + half, y - half, r);
            ctx.closePath();
        }

        function buildScene() {
            const count = w < 640 ? 4 : 6;
            blocks = [];
            const marginX = w * 0.14;
            const usable = w - marginX * 2;
            for (let i = 0; i < count; i++) {
                blocks.push({
                    x: marginX + (count === 1 ? 0 : (usable / (count - 1)) * i),
                    y: h / 2,
                    size: 46,
                    hash: '0x' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0')
                });
            }
            particles = [];
            for (let i = 0; i < 14; i++) {
                particles.push({
                    x: rand(0, w), y: rand(0, h),
                    vx: rand(-0.04, 0.04), vy: rand(-0.04, 0.04),
                    r: rand(1, 1.6), a: rand(0.06, 0.16)
                });
            }
        }

        function resize() {
            w = canvas.width = wrap.clientWidth;
            h = canvas.height = wrap.clientHeight;
            buildScene();
        }
        window.addEventListener('resize', resize);
        resize();

        let t = 0;

        function step() {
            ctx.clearRect(0, 0, w, h);
            t += 0.006;

            for (const p of particles) {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > w) p.vx *= -1;
                if (p.y < 0 || p.y > h) p.vy *= -1;
                ctx.beginPath();
                ctx.fillStyle = `rgba(255,255,255,${p.a})`;
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let i = 0; i < blocks.length - 1; i++) {
                const a = blocks[i], b = blocks[i + 1];
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(233,69,96,0.35)';
                ctx.lineWidth = 2;
                ctx.moveTo(a.x + a.size / 2, a.y);
                ctx.lineTo(b.x - b.size / 2, b.y);
                ctx.stroke();
            }

            const totalSegments = blocks.length - 1;
            const progress = (t % 1) * totalSegments;
            const segIndex = Math.min(Math.floor(progress), totalSegments - 1);
            const segT = progress - segIndex;
            const pa = blocks[segIndex], pb = blocks[segIndex + 1];
            const px = pa.x + (pb.x - pa.x) * segT;
            const py = pa.y + (pb.y - pa.y) * segT;

            const glowGrad = ctx.createRadialGradient(px, py, 0, px, py, 22);
            glowGrad.addColorStop(0, 'rgba(247,179,43,0.9)');
            glowGrad.addColorStop(1, 'rgba(247,179,43,0)');
            ctx.beginPath();
            ctx.fillStyle = glowGrad;
            ctx.arc(px, py, 22, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.fillStyle = '#f7b32b';
            ctx.arc(px, py, 3.5, 0, Math.PI * 2);
            ctx.fill();

            blocks.forEach((b, idx) => {
                const isLit = (idx === segIndex && segT < 0.5) || (idx === segIndex + 1 && segT >= 0.5) || (idx === 0 && segIndex === 0 && segT < 0.15);
                roundRect(b.x, b.y, b.size, 8);
                ctx.fillStyle = 'rgba(22,28,46,0.9)';
                ctx.fill();
                ctx.lineWidth = isLit ? 2 : 1.2;
                ctx.strokeStyle = isLit ? '#f7b32b' : 'rgba(233,69,96,0.55)';
                ctx.stroke();

                ctx.fillStyle = 'rgba(255,255,255,0.85)';
                ctx.font = '11px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('#' + (idx + 1), b.x, b.y + 4);

                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.font = '9px monospace';
                ctx.fillText(b.hash, b.x, b.y + b.size / 2 + 16);
            });

            requestAnimationFrame(step);
        }
        step();
    })();
    </script>

</div>

{% endblock %}
