{% extends "base.html" %}
{% block title %}Weather{% endblock %}
{% block content %}
    <h1>Weather App 🌤️</h1>
    <div class="card">
        <input type="text" id="city" placeholder="Enter city name..." style="width:90%;padding:12px;margin:10px 0;border-radius:8px;border:none;background-color:#0f3460;color:white;font-size:1em;">
        <br>
        <button class="btn" onclick="getWeather()">Get Weather</button>
    </div>
    <div class="card" id="result" style="display:none;">
        <h2 id="city-name" style="color:#e94560;"></h2>
        <p id="temp"></p>
        <p id="desc"></p>
        <p id="humidity"></p>
        <p id="wind"></p>
    </div>

    <script>
        async function getWeather() {
            const city = document.getElementById("city").value;
            const response = await fetch("/get-weather?city=" + city);
            const data = await response.json();

            if (data.error) {
                alert("City not found!");
                return;
            }

            document.getElementById("city-name").innerText = data.name + ", " + data.country;
            document.getElementById("temp").innerText = "Temperature: " + data.temp + "C";
            document.getElementById("desc").innerText = "Description: " + data.desc;
            document.getElementById("humidity").innerText = "Humidity: " + data.humidity + "%";
            document.getElementById("wind").innerText = "Wind: " + data.wind + " m/s";
            document.getElementById("result").style.display = "block";
        }
    </script>
{% endblock %}
