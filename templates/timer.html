{% extends "base.html" %}
{% block title %}Timer{% endblock %}
{% block content %}
<div style="max-width:400px; margin:60px auto; padding:0 20px;">

    <p style="font-size:13px; color:#666; margin-bottom:4px;">Timer</p>
    <h1 style="font-size:22px; font-weight:500; margin-bottom:32px; color:#fff;">⏱️ Timer</h1>

    <div style="background:#16213e; border-radius:12px; border:0.5px solid rgba(233,69,96,0.15); padding:32px; text-align:center;">
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:28px;">
            <div>
                <label style="font-size:11px; color:#666; display:block; margin-bottom:6px;">Hours</label>
                <input type="number" id="hours" value="0" min="0" max="23" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:18px; text-align:center;">
            </div>
            <div>
                <label style="font-size:11px; color:#666; display:block; margin-bottom:6px;">Minutes</label>
                <input type="number" id="minutes" value="0" min="0" max="59" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:18px; text-align:center;">
            </div>
            <div>
                <label style="font-size:11px; color:#666; display:block; margin-bottom:6px;">Seconds</label>
                <input type="number" id="seconds" value="0" min="0" max="59" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid rgba(255,255,255,0.1); background:#0f3460; color:#fff; font-size:18px; text-align:center;">
            </div>
        </div>
        <p id="display" style="font-size:56px; font-weight:500; color:#fff; margin:0 0 28px; letter-spacing:4px;">00:00:00</p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button onclick="startTimer()" id="startBtn" style="padding:12px 28px; background:#e94560; color:#fff; border:none; border-radius:8px; font-size:14px; cursor:pointer;">Start</button>
            <button onclick="pauseTimer()" style="padding:12px 28px; background:#0f3460; color:#ccc; border:none; border-radius:8px; font-size:14px; cursor:pointer;">Pause</button>
            <button onclick="resetTimer()" style="padding:12px 28px; background:#0f3460; color:#ccc; border:none; border-radius:8px; font-size:14px; cursor:pointer;">Reset</button>
        </div>
    </div>
</div>

<script>
let total = 0, remaining = 0, interval = null, running = false;
function fmt(s) {
    let h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    return [h,m,sec].map(v=>String(v).padStart(2,'0')).join(':');
}
function startTimer() {
    if (!running) {
        if (remaining === 0) {
            let h = parseInt(document.getElementById('hours').value)||0;
            let m = parseInt(document.getElementById('minutes').value)||0;
            let s = parseInt(document.getElementById('seconds').value)||0;
            remaining = h*3600 + m*60 + s;
        }
        if (remaining <= 0) return;
        running = true;
        interval = setInterval(() => {
            remaining--;
            document.getElementById('display').innerText = fmt(remaining);
            if (remaining <= 0) { clearInterval(interval); running = false; alert('Time is up!'); }
        }, 1000);
    }
}
function pauseTimer() { clearInterval(interval); running = false; }
function resetTimer() { clearInterval(interval); running = false; remaining = 0; document.getElementById('display').innerText = '00:00:00'; }
</script>
{% endblock %}
