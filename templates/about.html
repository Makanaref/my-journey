{% extends "base.html" %}
{% block title %}About Me{% endblock %}
{% block content %}
<div style="max-width:700px; margin:0 auto; padding:50px 30px;">

    <!-- Header -->
    <div style="margin-bottom:40px;">
        <p style="color:#e94560; font-size:0.85em; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px;">About Me</p>
        <h1 style="font-size:2.4em; color:#fff; margin-bottom:12px;">Makan 👋</h1>
        <p style="color:#999; font-size:1.05em; line-height:1.7;">Just For Fun!</p>
    </div>

    <!-- Stats -->
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:40px;">
        <div class="card" style="padding:20px; text-align:center;">
            <div style="color:#e94560; font-size:1.8em; font-weight:700;">50+</div>
            <div style="color:#888; font-size:0.8em; margin-top:4px;">Days of Commits</div>
        </div>
        <div class="card" style="padding:20px; text-align:center;">
            <div style="color:#e94560; font-size:1.8em; font-weight:700;">7+</div>
            <div style="color:#888; font-size:0.8em; margin-top:4px;">Projects Built</div>
        </div>
        <div class="card" style="padding:20px; text-align:center;">
            <div style="color:#e94560; font-size:1.8em; font-weight:700;">2</div>
            <div style="color:#888; font-size:0.8em; margin-top:4px;">APIs Integrated</div>
        </div>
    </div>

    <!-- Skills -->
    <div class="card" style="margin-bottom:24px;">
        <p style="color:#666; font-size:0.8em; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:16px;">Skills Learned</p>
        <div style="display:flex; flex-wrap:wrap; gap:10px;">
            <span style="background:#0f3460; color:#e94560; border:1px solid rgba(233,69,96,0.3); border-radius:20px; padding:6px 16px; font-size:0.85em;">Git</span>
            <span style="background:#0f3460; color:#e94560; border:1px solid rgba(233,69,96,0.3); border-radius:20px; padding:6px 16px; font-size:0.85em;">Python</span>
            <span style="background:#0f3460; color:#e94560; border:1px solid rgba(233,69,96,0.3); border-radius:20px; padding:6px 16px; font-size:0.85em;">Flask</span>
            <span style="background:#0f3460; color:#e94560; border:1px solid rgba(233,69,96,0.3); border-radius:20px; padding:6px 16px; font-size:0.85em;">REST API</span>
            <span style="background:#0f3460; color:#e94560; border:1px solid rgba(233,69,96,0.3); border-radius:20px; padding:6px 16px; font-size:0.85em;">JSON</span>
            <span style="background:#0f3460; color:#e94560; border:1px solid rgba(233,69,96,0.3); border-radius:20px; padding:6px 16px; font-size:0.85em;">CSS</span>
            <span style="background:#0f3460; color:#e94560; border:1px solid rgba(233,69,96,0.3); border-radius:20px; padding:6px 16px; font-size:0.85em;">Jinja2</span>
            <span style="background:#0f3460; color:#e94560; border:1px solid rgba(233,69,96,0.3); border-radius:20px; padding:6px 16px; font-size:0.85em;">Web3</span>
        </div>
    </div>

    <!-- Links -->
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <a href="/timeline" class="btn">📅 My Timeline</a>
        <a href="/contact" class="btn-outline">✉️ Contact</a>
        <a href="https://github.com/Makanaref" target="_blank" class="btn-outline">GitHub →</a>
    </div>

</div>
{% endblock %}
