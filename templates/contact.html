<!DOCTYPE html>
<html>
<head>
    <title>Contact Me</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #e94560;
            font-size: 3em;
        }
        .card {
            background-color: #16213e;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            margin: 30px auto;
        }
        input, textarea {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background-color: #0f3460;
            color: white;
            font-size: 1em;
        }
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            background-color: #e94560;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            font-size: 1em;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #c73652;
        }
    </style>
</head>
<body>
    <h1>Contact Me 📬</h1>
    <div class="card">
        <p>Have a question? Send me a message!</p>
        <input type="text" placeholder="Your Name" id="name">
        <input type="email" placeholder="Your Email" id="email">
        <textarea rows="5" placeholder="Your Message" id="message"></textarea>
        <br>
        <button class="btn" onclick="alert('Message sent! Thanks :)')">Send Message</button>
    </div>
    <br>
    <a href="/" class="btn">Home</a>
    <a href="/about" class="btn">About Me</a>
</body>
</html>
