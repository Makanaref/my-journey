{% extends "base.html" %}
{% block title %}Games — Makan 🎮{% endblock %}
{% block content %}

<div style="text-align:center; padding: 60px 30px 20px;">

    <h1 style="font-size:2em; margin-bottom:10px; opacity:0; animation: fadeUp 0.6s ease forwards;">🎮 Onchain Games</h1>
    <p style="color:rgba(255,255,255,0.5); margin-bottom:44px; opacity:0; animation: fadeUp 0.6s ease 0.1s forwards;">A small collection of onchain experiments.</p>

    <div style="display:flex; flex-wrap:wrap; gap:22px; justify-content:center; max-width:820px; margin:0 auto; opacity:0; animation: fadeUp 0.6s ease 0.2s forwards;">

        <a href="/oracle" class="game-card">
            <div style="font-size:2.6em; margin-bottom:12px;">🔮</div>
            <div style="font-weight:700; font-size:1.15em; color:#fff;">Oracle</div>
            <div style="color:rgba(255,255,255,0.45); font-size:0.85em; margin-top:8px;">Ask the chain your fortune</div>
        </a>

        <div class="game-card game-card-disabled">
            <div style="font-size:2.6em; margin-bottom:12px;">➕</div>
            <div style="font-weight:700; font-size:1.15em; color:#fff;">More Soon</div>
            <div style="color:rgba(255,255,255,0.45); font-size:0.85em; margin-top:8px;">New games coming</div>
        </div>

    </div>
</div>

<style>
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .game-card {
        display:block; width:200px; padding:28px 20px;
        border-radius:16px; border:1px solid rgba(233,69,96,0.25);
        background:rgba(255,255,255,0.03);
        text-decoration:none;
        transition:transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }
    .game-card:hover {
        transform:translateY(-4px);
        box-shadow:0 12px 28px rgba(233,69,96,0.25);
        border-color:rgba(233,69,96,0.5);
    }
    .game-card-disabled {
        opacity:0.4; cursor:default; pointer-events:none;
    }
</style>

{% endblock %}
