{% extends "base.html" %}
{% block title %}Password Generator{% endblock %}
{% block content %}
    <h1>Password Generator 🔐</h1>
    <div class="card">
        <input type="number" id="length" placeholder="Length" value="12" style="width:90%;padding:12px;border-radius:8px;border:none;background:#0f3460;color:white;font-size:1em;">
        <br><br>
        <label><input type="checkbox" id="upper" checked> Uppercase</label><br>
        <label><input type="checkbox" id="lower" checked> Lowercase</label><br>
        <label><input type="checkbox" id="numbers" checked> Numbers</label><br>
        <label><input type="checkbox" id="symbols"> Symbols</label>
        <br><br>
        <button class="btn" onclick="generate()">Generate!</button>
        <br><br>
        <input type="text" id="result" readonly style="width:90%;padding:12px;border-radius:8px;border:none;background:#0f3460;color:#e94560;font-size:1.2em;">
        <br><br>
        <button class="btn" onclick="copy()">Copy 📋</button>
    </div>
    <script>
        function generate() {
            const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const lower = "abcdefghijklmnopqrstuvwxyz";
            const nums = "0123456789";
            const syms = "!@#$%^&*()";
            let chars = "";
            if (document.getElementById("upper").checked) chars += upper;
            if (document.getElementById("lower").checked) chars += lower;
            if (document.getElementById("numbers").checked) chars += nums;
            if (document.getElementById("symbols").checked) chars += syms;
            if (!chars) { alert("Select at least one option!"); return; }
            const len = parseInt(document.getElementById("length").value);
            let pass = "";
            for (let i = 0; i < len; i++) {
                pass += chars[Math.floor(Math.random() * chars.length)];
            }
            document.getElementById("result").value = pass;
        }
        function copy() {
            const el = document.getElementById("result");
            el.select();
            document.execCommand("copy");
            alert("Copied!");
        }
    </script>
{% endblock %}
