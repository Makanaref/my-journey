{% extends "base.html" %}
{% block title %}Currency{% endblock %}
{% block content %}
    <h1>Currency Converter 💱</h1>
    <div class="card">
        <input type="text" id="base" placeholder="From (e.g. USD)" style="width:90%;padding:12px;margin:10px 0;border-radius:8px;border:none;background-color:#0f3460;color:white;font-size:1em;">
        <input type="text" id="target" placeholder="To (e.g. EUR)" style="width:90%;padding:12px;margin:10px 0;border-radius:8px;border:none;background-color:#0f3460;color:white;font-size:1em;">
        <input type="number" id="amount" placeholder="Amount" style="width:90%;padding:12px;margin:10px 0;border-radius:8px;border:none;background-color:#0f3460;color:white;font-size:1em;">
        <br>
        <button class="btn" onclick="convert()">Convert</button>
    </div>
    <div class="card" id="result" style="display:none;">
        <h2 id="result-text" style="color:#e94560;"></h2>
        <p id="rate-text"></p>
    </div>

    <script>
        async function convert() {
            const base = document.getElementById("base").value.toUpperCase();
            const target = document.getElementById("target").value.toUpperCase();
            const amount = document.getElementById("amount").value;
            const response = await fetch("/get-currency?base=" + base + "&target=" + target + "&amount=" + amount);
            const data = await response.json();

            if (data.error) {
                alert("Currency not found!");
                return;
            }

            document.getElementById("result-text").innerText = amount + " " + base + " = " + data.result + " " + target;
            document.getElementById("rate-text").innerText = "Rate: 1 " + base + " = " + data.rate + " " + target;
            document.getElementById("result").style.display = "block";
        }
    </script>
{% endblock %}
